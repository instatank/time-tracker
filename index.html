<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DayOS">
<title>DayOS</title>
<link rel="manifest" href="manifest.json">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d0d;
  --surface: #181818;
  --surface2: #212121;
  --surface3: #2a2a2a;
  --border: #2d2d2d;
  --border2: #3a3a3a;
  --text: #f0f0f0;
  --text2: #999;
  --text3: #555;
  --accent: #3b82f6;
  --danger: #ef4444;
  --success: #10b981;
  --warn: #f59e0b;

  --c-deep_work: #3b82f6;
  --c-admin:     #8b5cf6;
  --c-learning:  #10b981;
  --c-practice:  #f59e0b;
  --c-routine:   #6366f1;
  --c-leisure:   #f97316;
  --c-leaks:     #ef4444;

  --nav-h: 64px;
  --hdr-h: 52px;
  --r: 10px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

#root {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 600px;
  margin: 0 auto;
}

/* ── Header ─────────────────────────────────────────────────── */
#hdr {
  flex-shrink: 0;
  height: var(--hdr-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 1rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: relative;
  z-index: 10;
}
.logo {
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--text);
}
.hdr-right { display: flex; align-items: center; gap: 0.75rem; }
.sync-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text3);
  transition: background 0.3s;
}
.sync-dot.syncing { background: var(--warn); animation: pulse 1s infinite; }
.sync-dot.ok      { background: var(--success); }
.sync-dot.error   { background: var(--danger); }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
.auth-btn {
  font-size: 0.78rem;
  color: var(--text2);
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 0.25rem 0.6rem;
  cursor: pointer;
}
.auth-btn:hover { color: var(--text); }

/* ── Main scroll area ────────────────────────────────────────── */
#main {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--nav-h) + 1rem);
}

/* ── Bottom nav ──────────────────────────────────────────────── */
#nav {
  flex-shrink: 0;
  height: var(--nav-h);
  display: flex;
  align-items: stretch;
  border-top: 1px solid var(--border);
  background: var(--bg);
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  background: none;
  border: none;
  color: var(--text3);
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: color 0.15s;
}
.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 22px; height: 22px; }

/* ── Sections / cards ───────────────────────────────────────── */
.view { padding: 1rem; }
.section { margin-bottom: 1.25rem; }
.sec-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.6rem;
}
.sec-title { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em; color: var(--text2); text-transform: uppercase; }
.sec-meta  { font-size: 0.72rem; color: var(--text3); }

/* ── Today view ─────────────────────────────────────────────── */
.today-header { margin-bottom: 1rem; }
.today-date { font-size: 1.1rem; font-weight: 600; }
.today-greeting { font-size: 0.85rem; color: var(--text2); margin-top: 2px; }

.action-row {
  display: flex;
  gap: 0.6rem;
  margin-bottom: 1.25rem;
}
.btn-log, .btn-cap {
  flex: 1;
  padding: 0.7rem 1rem;
  border-radius: var(--r);
  border: none;
  font-size: 0.88rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  transition: opacity 0.15s;
}
.btn-log { background: var(--accent); color: #fff; }
.btn-cap { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }
.btn-log:active, .btn-cap:active { opacity: 0.8; }

/* ── Block item ─────────────────────────────────────────────── */
.block-item {
  display: flex;
  gap: 0.75rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 0.75rem;
  margin-bottom: 0.5rem;
  cursor: pointer;
  transition: border-color 0.15s;
}
.block-item:hover { border-color: var(--border2); }
.block-time {
  font-size: 0.72rem;
  color: var(--text3);
  min-width: 52px;
  padding-top: 2px;
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
}
.block-body { flex: 1; min-width: 0; }
.block-top {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  margin-bottom: 0.2rem;
  flex-wrap: wrap;
}
.cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.cat-label { font-size: 0.72rem; font-weight: 600; }
.block-dur { font-size: 0.7rem; color: var(--text3); margin-left: auto; }
.block-label { font-size: 0.88rem; font-weight: 500; color: var(--text); }
.block-note { font-size: 0.78rem; color: var(--text2); margin-top: 0.2rem; }
.energy-badge {
  display: inline-block;
  margin-top: 0.3rem;
  font-size: 0.65rem;
  padding: 1px 6px;
  border-radius: 4px;
  font-weight: 500;
  background: var(--surface3);
  color: var(--text2);
}
.energy-badge.energy-high { color: var(--success); }
.energy-badge.energy-low  { color: var(--danger); }

/* ── Capture item ───────────────────────────────────────────── */
.capture-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 0.75rem;
  margin-bottom: 0.5rem;
  cursor: pointer;
  transition: border-color 0.15s;
}
.capture-item:hover { border-color: var(--border2); }
.cap-meta {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  margin-bottom: 0.3rem;
  flex-wrap: wrap;
}
.cap-type { font-size: 0.72rem; font-weight: 600; color: var(--text2); }
.cap-time { font-size: 0.7rem; color: var(--text3); margin-left: auto; }
.cap-body { font-size: 0.88rem; color: var(--text); white-space: pre-wrap; }
.cap-body-preview {
  font-size: 0.88rem;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.project-tag { font-size: 0.7rem; color: var(--accent); }

/* ── Day score ──────────────────────────────────────────────── */
.score-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.5rem;
}
.score-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 0.6rem 0.4rem;
  text-align: center;
}
.score-val { display: block; font-size: 1rem; font-weight: 700; }
.score-val.warn { color: var(--warn); }
.score-val.good { color: var(--success); }
.score-label { display: block; font-size: 0.65rem; color: var(--text2); margin-top: 2px; }

/* ── Star rating ────────────────────────────────────────────── */
.star-row { display: flex; gap: 0.5rem; }
.star-btn {
  font-size: 1.6rem;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text3);
  transition: color 0.1s, transform 0.1s;
  padding: 0;
  line-height: 1;
}
.star-btn.filled { color: var(--warn); }
.star-btn:active { transform: scale(1.2); }

/* ── Journal view ───────────────────────────────────────────── */
.filter-row {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
  margin-bottom: 1rem;
}
.fpill {
  font-size: 0.75rem;
  padding: 0.3rem 0.7rem;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
}
.fpill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.prompt-card {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 0.85rem 1rem;
  margin-bottom: 1rem;
  cursor: pointer;
  transition: border-color 0.15s;
}
.prompt-card:hover { border-color: var(--accent); }
.prompt-icon { font-size: 1.3rem; flex-shrink: 0; }
.prompt-text { flex: 1; }
.prompt-text strong { display: block; font-size: 0.88rem; color: var(--text); }
.prompt-text span { font-size: 0.78rem; color: var(--text2); }
.prompt-arrow { color: var(--text3); font-size: 1rem; }

/* ── History view ───────────────────────────────────────────── */
.cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.75rem;
}
.cal-title { font-size: 0.9rem; font-weight: 600; }
.cal-nav-btn {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--text2);
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 0.9rem;
}
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
  margin-bottom: 1.25rem;
}
.cal-day-label {
  text-align: center;
  font-size: 0.65rem;
  color: var(--text3);
  padding: 0.2rem 0;
  font-weight: 600;
}
.cal-day {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.8rem;
  color: var(--text2);
  position: relative;
  border: 1px solid transparent;
  transition: all 0.1s;
}
.cal-day:hover { background: var(--surface2); }
.cal-day.today-cell { color: var(--text); font-weight: 700; }
.cal-day.selected { background: var(--accent); color: #fff; border-color: var(--accent); }
.cal-day.has-data .cal-dots { display: flex; gap: 1.5px; margin-top: 2px; }
.cal-dots { display: none; }
.cal-dot { width: 4px; height: 4px; border-radius: 50%; }
.cal-day.empty { cursor: default; }
.hist-day-hdr {
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 0.75rem;
  color: var(--text);
}

/* ── Dashboard view ─────────────────────────────────────────── */
.range-toggle {
  display: flex;
  background: var(--surface2);
  border-radius: 8px;
  padding: 3px;
  gap: 2px;
  margin-bottom: 1.25rem;
  align-self: flex-start;
  width: fit-content;
}
.range-btn {
  padding: 0.3rem 1rem;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.range-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.5); }

.bar-chart { margin-bottom: 1.25rem; }
.bar-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.55rem;
}
.bar-lbl { font-size: 0.78rem; color: var(--text2); min-width: 110px; flex-shrink: 0; }
.bar-track {
  flex: 1;
  height: 8px;
  background: var(--surface2);
  border-radius: 4px;
  overflow: hidden;
}
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
.bar-val { font-size: 0.72rem; color: var(--text3); min-width: 32px; text-align: right; font-variant-numeric: tabular-nums; }

.metrics-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.6rem;
}
.metric-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 0.85rem;
}
.metric-val { font-size: 1.5rem; font-weight: 700; line-height: 1.2; }
.metric-val.warn { color: var(--warn); }
.metric-val.bad  { color: var(--danger); }
.metric-val.good { color: var(--success); }
.metric-lbl { font-size: 0.72rem; color: var(--text2); margin-top: 3px; }

/* ── Empty state ────────────────────────────────────────────── */
.empty {
  text-align: center;
  padding: 2rem 1rem;
  color: var(--text3);
  font-size: 0.88rem;
}

/* ── Sheet modals ───────────────────────────────────────────── */
.backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.backdrop.visible { opacity: 1; pointer-events: auto; }

.sheet {
  position: fixed;
  bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
  width: 100%; max-width: 600px;
  background: var(--surface);
  border-radius: 16px 16px 0 0;
  border-top: 1px solid var(--border2);
  z-index: 101;
  transition: transform 0.25s cubic-bezier(0.32,0.72,0,1);
  max-height: 92dvh;
  overflow-y: auto;
  padding-bottom: env(safe-area-inset-bottom);
}
.sheet.open { transform: translateX(-50%) translateY(0); }
.sheet-handle {
  width: 36px; height: 4px;
  background: var(--border2);
  border-radius: 2px;
  margin: 0.7rem auto 0;
}
.sheet-title {
  font-size: 0.95rem;
  font-weight: 600;
  padding: 0.75rem 1rem 0.25rem;
  text-align: center;
}
.sheet-body { padding: 0.75rem 1rem 1.25rem; }

/* ── Form elements ──────────────────────────────────────────── */
.field { margin-bottom: 0.85rem; }
.field-label {
  display: block;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  color: var(--text2);
  text-transform: uppercase;
  margin-bottom: 0.35rem;
}
.field input, .field textarea, .field select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-size: 0.9rem;
  padding: 0.6rem 0.75rem;
  outline: none;
  font-family: inherit;
  transition: border-color 0.15s;
}
.field input:focus, .field textarea:focus, .field select:focus {
  border-color: var(--accent);
}
.field textarea { resize: vertical; min-height: 80px; }
.field select { appearance: none; }
select option { background: var(--surface2); }

.pill-row { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.pill {
  padding: 0.35rem 0.75rem;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: var(--surface3);
  color: var(--text2);
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.pill.active { border-color: transparent; color: #fff; }
.dur-pill { min-width: 48px; text-align: center; }

.cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.4rem; }
.cat-pill {
  padding: 0.4rem 0.25rem;
  border-radius: 8px;
  border: 2px solid var(--border2);
  background: var(--surface3);
  color: var(--text2);
  font-size: 0.72rem;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.cat-pill .cat-icon { font-size: 1rem; }
.cat-pill.active { color: #fff; }

.btn-row { display: flex; gap: 0.5rem; margin-top: 1rem; }
.btn-primary {
  flex: 1;
  padding: 0.75rem;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
}
.btn-ghost {
  flex: 1;
  padding: 0.75rem;
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  font-size: 0.9rem;
  cursor: pointer;
}
.btn-danger {
  padding: 0.75rem;
  background: transparent;
  color: var(--danger);
  border: 1px solid var(--danger);
  border-radius: 10px;
  font-size: 0.9rem;
  cursor: pointer;
}

/* ── Options sheet ──────────────────────────────────────────── */
.opt-btn {
  display: flex;
  width: 100%;
  align-items: center;
  gap: 0.75rem;
  padding: 0.85rem 0;
  background: none;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  font-size: 0.9rem;
  cursor: pointer;
  text-align: left;
}
.opt-btn:last-child { border-bottom: none; }
.opt-btn.del { color: var(--danger); }

/* ── Toast ──────────────────────────────────────────────────── */
#toasts {
  position: fixed;
  bottom: calc(var(--nav-h) + 0.75rem);
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.4rem;
  pointer-events: none;
  width: 90%;
  max-width: 360px;
}
.toast {
  background: var(--surface3);
  border: 1px solid var(--border2);
  color: var(--text);
  font-size: 0.82rem;
  padding: 0.55rem 1rem;
  border-radius: 8px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  animation: fadeup 0.2s ease;
}
@keyframes fadeup { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

/* ── Auth modal ─────────────────────────────────────────────── */
.auth-sheet .sheet-body { text-align: center; }
.auth-desc { font-size: 0.85rem; color: var(--text2); margin-bottom: 1.25rem; line-height: 1.5; }
.btn-google {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.6rem;
  width: 100%;
  padding: 0.75rem;
  background: #fff;
  color: #333;
  border: none;
  border-radius: 10px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 0.75rem;
}
.btn-google svg { width: 18px; height: 18px; }
.btn-signout {
  width: 100%;
  padding: 0.7rem;
  background: transparent;
  color: var(--danger);
  border: 1px solid var(--danger);
  border-radius: 10px;
  font-size: 0.88rem;
  cursor: pointer;
}
.auth-error {
  font-size: 0.78rem;
  color: var(--danger);
  margin-top: 0.5rem;
  min-height: 1.2em;
}
.user-info { margin-bottom: 0.75rem; }
.user-name { font-size: 1rem; font-weight: 600; }
.user-email { font-size: 0.78rem; color: var(--text2); }
.sync-panel {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 0.75rem;
  margin-bottom: 0.75rem;
  text-align: left;
}
.sync-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem; }
.sync-row:last-child { margin-bottom: 0; }
.sync-key { font-size: 0.75rem; color: var(--text2); }
.sync-val { font-size: 0.75rem; font-weight: 600; }
.sync-val.ok     { color: var(--success); }
.sync-val.error  { color: var(--danger); }
.sync-val.syncing { color: var(--warn); }
.sync-val.idle   { color: var(--text3); }
.sync-err-msg { font-size: 0.75rem; color: var(--danger); margin-top: 0.5rem; line-height: 1.4; }
</style>
</head>
<body>
<div id="root">
  <header id="hdr"></header>
  <main id="main"></main>
  <nav id="nav"></nav>
</div>

<!-- Sheet: Log Block -->
<div id="sheet-block" class="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="block-sheet-title">Log Block</div>
  <div class="sheet-body">
    <div class="field">
      <label class="field-label">Start Time</label>
      <input type="time" id="f-time">
    </div>
    <div class="field">
      <label class="field-label">Duration</label>
      <div class="pill-row">
        <button class="pill dur-pill" data-dur="30">30m</button>
        <button class="pill dur-pill" data-dur="45">45m</button>
        <button class="pill dur-pill" data-dur="60">60m</button>
        <button class="pill dur-pill" data-dur="90">90m</button>
        <button class="pill dur-pill" data-dur="0">Custom</button>
      </div>
      <input type="number" id="f-dur-custom" placeholder="Minutes" style="display:none;margin-top:0.5rem;width:100px">
    </div>

<script type="module">
import { initializeApp }                    from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
import { getAuth, GoogleAuthProvider,
         signInWithRedirect,
         getRedirectResult, signOut,

import { getFirestore, collection, doc,
         getDocs, setDoc, deleteDoc,
         onSnapshot, writeBatch }           from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

// ── Firebase ──────────────────────────────────────────────────
const fbApp = initializeApp({
  apiKey:            "AIzaSyAxVCwVHFxRSHNXDhAoCGhj4Y1yfs6qUks",
  authDomain:        "time-tracker-f07da.firebaseapp.com",
  projectId:         "time-tracker-f07da",
  storageBucket:     "time-tracker-f07da.firebasestorage.app",
  messagingSenderId: "121620268176",
  appId:             "1:121620268176:web:35250f2252023378f3c415"
});
const auth = getAuth(fbApp);
const db   = getFirestore(fbApp);
let unsubs = [];

// ── Constants ─────────────────────────────────────────────────
const CATS = [
  { id: 'deep_work', label: 'Deep Work', icon: '🎯', color: '#3b82f6' },
  { id: 'admin',     label: 'Admin',     icon: '📋', color: '#8b5cf6' },
  { id: 'learning',  label: 'Learning',  icon: '📚', color: '#10b981' },
  { id: 'practice',  label: 'Practice',  icon: '🧘', color: '#f59e0b' },
  { id: 'routine',   label: 'Routine',   icon: '🏠', color: '#6366f1' },
  { id: 'leisure',   label: 'Leisure',   icon: '🎮', color: '#f97316' },
  { id: 'leaks',     label: 'Leaks',     icon: '🕳️', color: '#ef4444' },
];
const CTYPES = [
  { id: 'note',    label: 'Quick Note', icon: '💭' },
  { id: 'journal', label: 'Journal',    icon: '📓' },
  { id: 'project', label: 'Project',    icon: '📁' },
  { id: 'insight', label: 'Insight',    icon: '✨' },
];
const SK = { BLOCKS: 'dayos_blocks_v1', CAPTURES: 'dayos_captures_v1', RATINGS: 'dayos_ratings_v1' };

// ── State ─────────────────────────────────────────────────────
let blocks   = loadLocal(SK.BLOCKS, []);
let captures = loadLocal(SK.CAPTURES, []);
let ratings  = loadLocal(SK.RATINGS, {});
let activeTab = 'today';
let histDate  = todayStr();
let histCalMonth = new Date(); histCalMonth.setDate(1);
let journalFilter = 'all';
let dashRange = 'week';
let user = null;
let syncStatus = 'idle';

// ── Modal state ───────────────────────────────────────────────
let editingBlockId = null;
let editingCaptureId = null;
let selCat = 'deep_work';
let selDur = 30;
let selEnergy = '';
let selCapType = 'note';

// ── Storage ───────────────────────────────────────────────────
function loadLocal(key, def) {
  try { return JSON.parse(localStorage.getItem(key)) ?? def; } catch { return def; }
}
function saveLocal(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
function saveAll() {
  saveLocal(SK.BLOCKS, blocks);
  saveLocal(SK.CAPTURES, captures);
  saveLocal(SK.RATINGS, ratings);
}

// ── Utils ─────────────────────────────────────────────────────
function todayStr() { return new Date().toISOString().slice(0,10); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function catById(id) { return CATS.find(c => c.id === id) || CATS[0]; }
function ctypeById(id) { return CTYPES.find(c => c.id === id) || CTYPES[0]; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', hour12:true });
}
function fmtDate(d) {
  return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric' });
}
function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0,10);
}
function greeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Good morning';
  if (h < 17) return 'Good afternoon';
  return 'Good evening';
}
function fmtDayHeader() {
  return new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
}
function timeToISO(dateStr, timeStr) {
  return `${dateStr}T${timeStr}:00`;
}

// ── Compute ───────────────────────────────────────────────────
function dayScore(date) {
  const bks = blocks.filter(b => b.date === date);
  const caps = captures.filter(c => c.timestamp.startsWith(date));
  const totalMin = bks.reduce((s, b) => s + (b.duration_min || 0), 0);
  const deepWorkMin = bks.filter(b => b.category === 'deep_work').reduce((s, b) => s + (b.duration_min || 0), 0);
  const leakMin = bks.filter(b => b.category === 'leaks').reduce((s, b) => s + (b.duration_min || 0), 0);
  const practiceDone = bks.some(b => b.category === 'practice');
  const journalDone = caps.some(c => c.type === 'journal');
  return {
    totalHrs: totalMin / 60,
    deepWorkHrs: deepWorkMin / 60,
    leakHrs: leakMin / 60,
    practiceDone,
    journalDone,
  };
}
function catBreakdown(bks) {
  const map = {};
  CATS.forEach(c => map[c.id] = 0);
  bks.forEach(b => { map[b.category] = (map[b.category] || 0) + (b.duration_min || 0) / 60; });
  return map;
}
function journalStreak() {
  let streak = 0;
  let d = todayStr();
  while (true) {
    const hasCap = captures.some(c => c.timestamp.startsWith(d) && c.type === 'journal');
    if (!hasCap) break;
    streak++;
    d = addDays(d, -1);
  }
  return streak;
}
function avgRating(startDate, endDate) {
  const vals = [];
  let d = startDate;
  while (d <= endDate) {
    if (ratings[d]) vals.push(ratings[d]);
    d = addDays(d, 1);
  }
  return vals.length ? vals.reduce((a,b) => a+b, 0) / vals.length : 0;
}

// ── Render ────────────────────────────────────────────────────
function render() {
  renderHdr();
  renderNav();
  renderMain();
}

function renderHdr() {
  document.getElementById('hdr').innerHTML = `
    <span class="logo">DayOS</span>
    <div class="hdr-right">
      <span class="sync-dot ${syncStatus}" title="${syncStatus}"></span>

    </div>
  `;
}

function renderNav() {
  const tabs = [
    { id: 'today',     icon: navIconToday(),     label: 'Today' },
    { id: 'journal',   icon: navIconJournal(),   label: 'Journal' },
    { id: 'history',   icon: navIconHistory(),   label: 'History' },
    { id: 'dashboard', icon: navIconDashboard(), label: 'Trends' },
  ];
  document.getElementById('nav').innerHTML = tabs.map(t => `
    <button class="nav-btn ${activeTab === t.id ? 'active' : ''}" onclick="setTab('${t.id}')">
      ${t.icon}
      <span>${t.label}</span>
    </button>
  `).join('');
}

function renderMain() {
  const el = document.getElementById('main');
  el.scrollTop = 0;
  switch (activeTab) {
    case 'today':     el.innerHTML = renderToday(); break;
    case 'journal':   el.innerHTML = renderJournal(); break;
    case 'history':   el.innerHTML = renderHistory(); break;
    case 'dashboard': el.innerHTML = renderDashboard(); break;
  }
}

// ── Today ─────────────────────────────────────────────────────
function renderToday() {
  const d = todayStr();
  const bks = blocks.filter(b => b.date === d).sort((a,b) => a.start_time.localeCompare(b.start_time));
  const caps = captures.filter(c => c.timestamp.startsWith(d)).sort((a,b) => a.timestamp.localeCompare(b.timestamp));
  const sc = dayScore(d);
  const r = ratings[d] || 0;

  return `<div class="view">
    <div class="section today-header">
      <div class="today-date">${fmtDayHeader()}</div>
      <div class="today-greeting">${greeting()}</div>
    </div>

    <div class="action-row">
      <button class="btn-log" onclick="openLogBlock()">+ Log Block</button>
      <button class="btn-cap" onclick="openCapture()">+ Capture</button>
    </div>

    <div class="section">
      <div class="sec-hdr">
        <span class="sec-title">Today's Log</span>
        <span class="sec-meta">${sc.totalHrs > 0 ? sc.totalHrs.toFixed(1) + 'h logged' : ''}</span>
      </div>
      ${bks.length ? bks.map(renderBlock).join('') : '<div class="empty">No blocks yet — tap Log Block to start.</div>'}
    </div>

    ${caps.length ? `
    <div class="section">
      <div class="sec-hdr"><span class="sec-title">Captures</span></div>
      ${caps.map(renderCapPreview).join('')}
    </div>` : ''}

    <div class="section">
      <div class="sec-hdr"><span class="sec-title">Day Score</span></div>
      <div class="score-grid">
        <div class="score-item">
          <span class="score-val">${sc.deepWorkHrs.toFixed(1)}h</span>
          <span class="score-label">Deep Work</span>
        </div>
        <div class="score-item">
          <span class="score-val ${sc.leakHrs >= 1 ? 'warn' : ''}">${sc.leakHrs.toFixed(1)}h</span>
          <span class="score-label">Leaks</span>
        </div>
        <div class="score-item">
          <span class="score-val ${sc.practiceDone ? 'good' : ''}">${sc.practiceDone ? '✓' : '–'}</span>
          <span class="score-label">Practice</span>
        </div>
        <div class="score-item">
          <span class="score-val ${sc.journalDone ? 'good' : ''}">${sc.journalDone ? '✓' : '–'}</span>
          <span class="score-label">Journal</span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="sec-hdr"><span class="sec-title">Rate Your Day</span></div>
      <div class="star-row">
        ${[1,2,3,4,5].map(i => `
          <button class="star-btn ${r >= i ? 'filled' : ''}" onclick="setRating('${d}', ${i})">★</button>
        `).join('')}
      </div>
    </div>
  </div>`;
}

function renderBlock(b) {
  const cat = catById(b.category);
  return `
    <div class="block-item" onclick="openBlockOpts('${b.id}')">
      <div class="block-time">${b.start_time ? fmtTime(b.date + 'T' + b.start_time) : ''}</div>
      <div class="block-body">
        <div class="block-top">
          <span class="cat-dot" style="background:${cat.color}"></span>
          <span class="cat-label" style="color:${cat.color}">${cat.label}</span>
          ${b.duration_min ? `<span class="block-dur">${b.duration_min}m</span>` : ''}
        </div>
        <div class="block-label">${esc(b.label)}</div>
        ${b.note ? `<div class="block-note">${esc(b.note)}</div>` : ''}
        ${b.energy_level ? `<span class="energy-badge energy-${b.energy_level.toLowerCase()}">${b.energy_level} energy</span>` : ''}
      </div>
    </div>`;
}

function renderCapPreview(c) {
  const ct = ctypeById(c.type);
  return `
    <div class="capture-item" onclick="openCapOpts('${c.id}')">
      <div class="cap-meta">
        <span>${ct.icon}</span>
        <span class="cap-type">${ct.label}</span>
        ${c.project_tag ? `<span class="project-tag">#${esc(c.project_tag)}</span>` : ''}
        <span class="cap-time">${fmtTime(c.timestamp)}</span>
      </div>
      <div class="cap-body-preview">${esc(c.body)}</div>
    </div>`;
}

// ── Journal ───────────────────────────────────────────────────
function renderJournal() {
  const h = new Date().getHours();
  const showMorning = h < 12;
  const showEvening = h >= 18;
  const filtered = (journalFilter === 'all' ? [...captures] : captures.filter(c => c.type === journalFilter))
    .sort((a,b) => b.timestamp.localeCompare(a.timestamp));

  const typeLabel = { note: 'Quick Note', journal: 'Journal', project: 'Project', insight: 'Insight' };

  return `<div class="view">
    <div class="filter-row">
      ${['all','note','journal','project','insight'].map(f => `
        <button class="fpill ${journalFilter===f?'active':''}" onclick="setJFilter('${f}')">
          ${f === 'all' ? 'All' : (typeLabel[f] || f)}
        </button>`).join('')}
    </div>

    ${(showMorning || showEvening) && journalFilter === 'all' ? `
      <div class="prompt-card" onclick="openCapture('journal')">
        <div class="prompt-icon">${showMorning ? '🌅' : '🌙'}</div>
        <div class="prompt-text">
          <strong>${showMorning ? 'Morning check-in' : 'Evening reflection'}</strong>
          <span>${showMorning ? 'What matters today?' : 'How did the day go?'}</span>
        </div>
        <span class="prompt-arrow">→</span>
      </div>` : ''}

    ${filtered.length ? filtered.map(renderCapFull).join('') :
      `<div class="empty">${journalFilter === 'all' ? 'No captures yet.' : 'No ' + (typeLabel[journalFilter] || journalFilter) + ' entries yet.'}</div>`}
  </div>`;
}

function renderCapFull(c) {
  const ct = ctypeById(c.type);
  const date = c.timestamp.slice(0,10);
  const isToday = date === todayStr();
  const dateLabel = isToday ? `Today · ${fmtTime(c.timestamp)}` : `${fmtDate(date)} · ${fmtTime(c.timestamp)}`;
  return `
    <div class="capture-item" onclick="openCapOpts('${c.id}')">
      <div class="cap-meta">
        <span>${ct.icon}</span>
        <span class="cap-type">${ct.label}</span>
        ${c.project_tag ? `<span class="project-tag">#${esc(c.project_tag)}</span>` : ''}
        <span class="cap-time">${dateLabel}</span>
      </div>
      <div class="cap-body" style="margin-top:0.25rem">${esc(c.body)}</div>
    </div>`;
}

// ── History ───────────────────────────────────────────────────
function renderHistory() {
  return `<div class="view">
    ${renderCalendar()}
    <div class="hist-day-hdr">
      ${fmtDate(histDate)}${ratings[histDate] ? ' &nbsp;·&nbsp; ' + '★'.repeat(ratings[histDate]) : ''}
    </div>
    ${renderDayBlocks(histDate)}
  </div>`;
}

function renderCalendar() {
  const y = histCalMonth.getFullYear();
  const m = histCalMonth.getMonth();
  const firstDay = new Date(y, m, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const td = todayStr();
  const monthLabel = histCalMonth.toLocaleDateString('en-US', { month:'long', year:'numeric' });

  // Collect dates with data (any blocks or captures)
  const datesWithBlocks = new Set(blocks.map(b => b.date));
  const datesWithCaps   = new Set(captures.map(c => c.timestamp.slice(0,10)));

  const dayNames = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  let cells = '';
  // Day name headers
  cells += dayNames.map(d => `<div class="cal-day-label">${d}</div>`).join('');
  // Empty cells before first day
  for (let i = 0; i < firstDay; i++) cells += `<div class="cal-day empty"></div>`;
  // Day cells
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === td;
    const isSelected = dateStr === histDate;
    const hasBk = datesWithBlocks.has(dateStr);
    const hasCp = datesWithCaps.has(dateStr);
    const hasData = hasBk || hasCp;
    const dotsBk = hasBk ? `<span class="cal-dot" style="background:var(--accent)"></span>` : '';
    const dotsCp = hasCp ? `<span class="cal-dot" style="background:var(--success)"></span>` : '';
    cells += `
      <div class="cal-day ${isToday?'today-cell':''} ${isSelected?'selected':''} ${hasData?'has-data':''}"
           onclick="setHistDate('${dateStr}')">
        ${d}
        <div class="cal-dots">${dotsBk}${dotsCp}</div>
      </div>`;
  }

  return `
    <div class="section">
      <div class="cal-header">
        <button class="cal-nav-btn" onclick="calPrevMonth()">‹</button>
        <span class="cal-title">${monthLabel}</span>
        <button class="cal-nav-btn" onclick="calNextMonth()">›</button>
      </div>
      <div class="cal-grid">${cells}</div>
    </div>`;
}

function renderDayBlocks(date) {
  const bks = blocks.filter(b => b.date === date).sort((a,b) => a.start_time.localeCompare(b.start_time));
  const caps = captures.filter(c => c.timestamp.startsWith(date));
  if (!bks.length && !caps.length) return '<div class="empty">No data for this day.</div>';
  return [
    ...bks.map(renderBlock),
    ...(caps.length ? [`<div class="sec-hdr" style="margin-top:0.75rem"><span class="sec-title">Captures</span></div>`, ...caps.map(renderCapPreview)] : [])
  ].join('');
}

// ── Dashboard ─────────────────────────────────────────────────
function renderDashboard() {
  const td = todayStr();
  const n = dashRange === 'week' ? 7 : 30;
  const startDate = addDays(td, -(n-1));
  const rangeBlocks = blocks.filter(b => b.date >= startDate && b.date <= td);
  const breakdown = catBreakdown(rangeBlocks);
  const maxHrs = Math.max(...Object.values(breakdown), 0.1);
  const totalHrs = Object.values(breakdown).reduce((a,b) => a+b, 0);
  const deepWorkHrs = breakdown['deep_work'] || 0;
  const leakHrs = breakdown['leaks'] || 0;
  const leakPct = totalHrs > 0 ? (leakHrs / totalHrs) * 100 : 0;
  const jStreak = journalStreak();
  const avgR = avgRating(startDate, td);

  const bars = CATS.map(c => {
    const hrs = breakdown[c.id] || 0;
    const pct = totalHrs > 0 ? (hrs / maxHrs) * 100 : 0;
    return `
      <div class="bar-row">
        <span class="bar-lbl">${c.icon} ${c.label}</span>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%;background:${c.color}"></div>
        </div>
        <span class="bar-val">${hrs > 0 ? hrs.toFixed(1) + 'h' : '—'}</span>
      </div>`;
  }).join('');

  const leakClass = leakPct > 15 ? 'bad' : leakPct > 8 ? 'warn' : 'good';

  return `<div class="view">
    <div class="range-toggle">
      <button class="range-btn ${dashRange==='week'?'active':''}" onclick="setDashRange('week')">Week</button>
      <button class="range-btn ${dashRange==='month'?'active':''}" onclick="setDashRange('month')">Month</button>
    </div>

    <div class="section">
      <div class="sec-hdr"><span class="sec-title">Time by Category</span><span class="sec-meta">${totalHrs.toFixed(1)}h total</span></div>
      <div class="bar-chart">${bars}</div>
    </div>

    <div class="section">
      <div class="sec-hdr"><span class="sec-title">Metrics</span></div>
      <div class="metrics-grid">
        <div class="metric-card">
          <div class="metric-val">${deepWorkHrs.toFixed(1)}h</div>
          <div class="metric-lbl">Deep Work</div>
        </div>
        <div class="metric-card">
          <div class="metric-val ${leakClass}">${leakPct.toFixed(0)}%</div>
          <div class="metric-lbl">Leak Rate</div>
        </div>
        <div class="metric-card">
          <div class="metric-val">${jStreak}</div>
          <div class="metric-lbl">Journal Streak</div>
        </div>
        <div class="metric-card">
          <div class="metric-val">${avgR ? avgR.toFixed(1) : '—'}</div>
          <div class="metric-lbl">Avg Day Rating</div>
        </div>
      </div>
    </div>
  </div>`;
}

// ── Sheet: Log Block ──────────────────────────────────────────
function openLogBlock(blockId = null) {
  editingBlockId = blockId;
  const b = blockId ? blocks.find(x => x.id === blockId) : null;

  // Populate defaults
  const now = new Date();
  const defaultTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  document.getElementById('block-sheet-title').textContent = blockId ? 'Edit Block' : 'Log Block';
  document.getElementById('f-time').value = b ? b.start_time : defaultTime;
  document.getElementById('f-label').value = b ? b.label : '';
  document.getElementById('f-note').value  = b ? (b.note || '') : '';

  selCat    = b ? b.category   : 'deep_work';
  selDur    = b ? (b.duration_min || 30) : 30;
  selEnergy = b ? (b.energy_level || '') : '';

  renderCatGrid();
  renderDurPills();
  renderEnergyPills();

  openSheet('sheet-block');
  setTimeout(() => document.getElementById('f-label').focus(), 300);
}

function renderCatGrid() {
  document.getElementById('cat-grid').innerHTML = CATS.map(c => `
    <button class="cat-pill ${selCat === c.id ? 'active' : ''}"
            style="${selCat === c.id ? `background:${c.color};border-color:${c.color};` : ''}"

      <span>${c.label}</span>
    </button>`).join('');

function renderDurPills() {
  document.querySelectorAll('.dur-pill').forEach(btn => {
    const v = parseInt(btn.dataset.dur);
    const isCustom = v === 0;
    const isActive = isCustom ? (![30,45,60,90].includes(selDur)) : (v === selDur);
    btn.classList.toggle('active', isActive);
    if (isActive) btn.style.background = 'var(--accent)';
    else btn.style.background = '';
  });
  const custom = document.getElementById('f-dur-custom');
  const showCustom = ![30,45,60,90].includes(selDur);
  custom.style.display = showCustom ? 'block' : 'none';
  if (showCustom) custom.value = selDur || '';
}

function renderEnergyPills() {
  document.querySelectorAll('[data-energy]').forEach(btn => {
    const isActive = btn.dataset.energy === selEnergy;
    btn.classList.toggle('active', isActive);
    btn.style.background = isActive ? 'var(--accent)' : '';
  });
}

window.selCatFn = function(id) { selCat = id; renderCatGrid(); };

// Dur pill clicks
document.querySelectorAll('.dur-pill').forEach(btn => {
  btn.addEventListener('click', () => {
    const v = parseInt(btn.dataset.dur);
    if (v === 0) { selDur = 0; } else { selDur = v; }
    renderDurPills();
  });
});

// Energy pill clicks
document.querySelectorAll('[data-energy]').forEach(btn => {
  btn.addEventListener('click', () => {
    selEnergy = selEnergy === btn.dataset.energy ? '' : btn.dataset.energy;
    renderEnergyPills();
  });
});

window.saveBlock = function() {
  const label = document.getElementById('f-label').value.trim();
  if (!label) { toast('Activity label is required'); return; }

  const timeVal = document.getElementById('f-time').value;
  const noteVal = document.getElementById('f-note').value.trim();
  const customDurVal = parseInt(document.getElementById('f-dur-custom').value) || 0;
  const duration = selDur === 0 ? customDurVal : selDur;
  const date = todayStr(); // always log to today from this modal (editing preserves original date)

  if (editingBlockId) {
    const idx = blocks.findIndex(b => b.id === editingBlockId);
    if (idx > -1) {
      blocks[idx] = { ...blocks[idx], start_time: timeVal, duration_min: duration, category: selCat, label, note: noteVal, energy_level: selEnergy };
      syncBlockDoc(blocks[idx]);
      toast('Block updated');
    }
  } else {
    const b = { id: uid(), date, start_time: timeVal, duration_min: duration, category: selCat, label, note: noteVal, energy_level: selEnergy };
    blocks.push(b);
    syncBlockDoc(b);
    toast('Block logged');
  }
  saveLocal(SK.BLOCKS, blocks);
  closeSheets();
  render();
};

window.saveCapture = function() {

  const projectTag = document.getElementById('f-project-tag').value.trim();

  if (editingCaptureId) {

      syncCaptureDoc(captures[idx]);
      toast('Entry updated');

    captures.push(c);

// ── Auth helpers ───────────────────────────────────────────────
const GOOGLE_SVG = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="18" height="18"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>`;

function authErrMsg(code) {
  const map = {
    'auth/popup-blocked':              'Popup was blocked — switching to redirect sign-in.',
    'auth/popup-closed-by-user':       'Sign-in window was closed.',
    'auth/cancelled-popup-request':    'Sign-in cancelled.',
    'auth/unauthorized-domain':        'This domain is not authorized. Add it in Firebase Console → Authentication → Authorized Domains.',
    'auth/network-request-failed':     'Network error — check your connection and try again.',
    'auth/too-many-requests':          'Too many attempts — please wait a moment and try again.',
    'auth/internal-error':             'Internal error — please try again.',
    'auth/user-disabled':              'This account has been disabled.',
  };
  return map[code] || `Sign-in failed: ${code}`;
}

function setAuthError(msg) {
  setSyncStatus('error');
  const el = document.getElementById('auth-error');
  if (el) { el.textContent = msg; el.style.display = 'block'; }
}

// ── Firestore batch write (handles >500 docs by splitting) ────
async function firestoreBatchWrite(uid, allBlocks, allCaptures, allRatings) {
  const ops = [
    ...allBlocks.map(b   => ({ ref: doc(db, 'users', uid, 'blocks',   b.id), data: b })),
    ...allCaptures.map(c => ({ ref: doc(db, 'users', uid, 'captures', c.id), data: c })),
    ...Object.entries(allRatings).map(([date, r]) => ({
      ref: doc(db, 'users', uid, 'ratings', date), data: { rating: r }
    })),
  ];
  const CHUNK = 400;
  for (let i = 0; i < ops.length; i += CHUNK) {
    const batch = writeBatch(db);
    ops.slice(i, i + CHUNK).forEach(op => batch.set(op.ref, op.data));
    await batch.commit();
  }
}

// ── Auth sheet UI ──────────────────────────────────────────────
window.openAuth = function() {
  const body = document.getElementById('auth-body');
  const pendingRedirect = sessionStorage.getItem('dayos_redirect_pending');

  if (user) {
    const statusLabels = { ok: '✓ Synced', syncing: 'Syncing…', error: 'Error', idle: 'Not synced' };
    const statusLabel = statusLabels[syncStatus] || syncStatus;
    body.innerHTML = `
      <div class="user-info">
        <div class="user-name">${esc(user.displayName || 'User')}</div>
        <div class="user-email">${esc(user.email || '')}</div>
      </div>
      <div class="sync-panel">
        <div class="sync-row">
          <span class="sync-key">Cloud sync</span>
          <span class="sync-val ${syncStatus}">${statusLabel}</span>
        </div>
        <div class="sync-row">
          <span class="sync-key">Local data</span>
          <span class="sync-val">${blocks.length} blocks · ${captures.length} captures</span>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn-primary" onclick="forcePushToCloud()">↑ Push local → cloud</button>
        <button class="btn-ghost"    onclick="forcePullFromCloud()">↓ Pull cloud → local</button>
      </div>
      <div class="sync-err-msg" id="sync-sheet-err"></div>
      <button class="btn-signout" style="margin-top:0.75rem" onclick="doSignOut()">Sign out</button>
    `;
  } else if (pendingRedirect) {
    // Page just reloaded after Google redirect — show waiting state
    body.innerHTML = `
      <div style="text-align:center;padding:1.5rem 0">
        <div style="font-size:1.5rem;margin-bottom:0.75rem">⏳</div>
        <p style="color:var(--text2);font-size:0.88rem">Completing sign-in…</p>
      </div>
    `;
  } else {
    body.innerHTML = `
      <p class="auth-desc">Sign in to back up and sync your data across devices. Your existing entries will be preserved.</p>
      <button class="btn-google" id="btn-google-signin" onclick="doSignIn()">
        ${GOOGLE_SVG}
        Continue with Google
      </button>
      <div class="auth-error" id="auth-error" style="display:none"></div>
    `;
  }
  openSheet('sheet-auth');
};

window.doSignIn = async function() {
  const btn = document.getElementById('btn-google-signin');
  if (btn) { btn.disabled = true; btn.textContent = 'Redirecting to Google…'; }

  // Always use redirect — popup is unreliable in modern browsers due to
  // third-party cookie restrictions (Chrome, Safari) blocking the OAuth postMessage.
  sessionStorage.setItem('dayos_redirect_pending', '1');
  try {
    await signInWithRedirect(auth, new GoogleAuthProvider());
  } catch (err) {
    sessionStorage.removeItem('dayos_redirect_pending');
    setAuthError(authErrMsg(err.code));
    if (btn) { btn.disabled = false; btn.innerHTML = GOOGLE_SVG + ' Continue with Google'; }
  }
};

window.doSignOut = async function() {
  await signOut(auth);
  unsubs.forEach(u => u());
  unsubs = [];
  closeSheets();
  toast('Signed out');
  render();
};

// Push everything from localStorage → Firestore (use on the device that HAS the data)
window.forcePushToCloud = async function() {
  if (!user) return;
  setSyncStatus('syncing');
  openAuth(); // refresh sheet to show "Syncing…"
  try {
    await firestoreBatchWrite(user.uid, blocks, captures, ratings);
    setSyncStatus('ok');
    toast(`✓ Uploaded ${blocks.length} blocks & ${captures.length} captures to cloud`, 3500);
    openAuth();
  } catch (err) {
    setSyncStatus('error');
    const msg = (err.code === 'permission-denied' || err.message?.includes('permission'))
      ? 'Permission denied — fix Firestore rules (see note below)'
      : (err.message || 'Unknown error');
    const el = document.getElementById('sync-sheet-err');
    if (el) {
      el.textContent = msg;
      if (err.code === 'permission-denied') {
        el.textContent += '\n\nFix: Firebase Console → Firestore → Rules → paste:\n\nrules_version = \'2\';\nservice cloud.firestore {\n  match /databases/{database}/documents {\n    match /users/{userId}/{document=**} {\n      allow read, write: if request.auth.uid == userId;\n    }\n  }\n}';
        el.style.whiteSpace = 'pre-wrap';
      }
    }
    toast('Upload failed: ' + msg, 5000);
    console.error('[DayOS] Push error:', err);
  }
};

// Pull everything from Firestore → localStorage (use on the device that NEEDS the data)
window.forcePullFromCloud = async function() {
  if (!user) return;
  setSyncStatus('syncing');
  openAuth();
  try {
    const [bSnap, cSnap, rSnap] = await Promise.all([
      getDocs(collection(db, 'users', user.uid, 'blocks')),
      getDocs(collection(db, 'users', user.uid, 'captures')),
      getDocs(collection(db, 'users', user.uid, 'ratings')),
    ]);
    const remoteBlocks   = bSnap.docs.map(d => d.data());
    const remoteCaptures = cSnap.docs.map(d => d.data());
    const remoteRatings  = {};
    rSnap.docs.forEach(d => { remoteRatings[d.id] = d.data().rating; });

    // Merge: keep all local + all remote (local fills gaps, remote wins same ID)
    blocks   = mergeById(blocks, remoteBlocks);
    captures = mergeById(captures, remoteCaptures);
    ratings  = { ...ratings, ...remoteRatings };
    saveAll();

    setSyncStatus('ok');
    toast(`✓ Pulled ${blocks.length} blocks & ${captures.length} captures from cloud`, 3500);
    openAuth();
    render();
  } catch (err) {
    setSyncStatus('error');
    const msg = (err.code === 'permission-denied')
      ? 'Permission denied — fix Firestore security rules'
      : (err.message || 'Unknown error');
    const el = document.getElementById('sync-sheet-err');
    if (el) el.textContent = msg;
    toast('Pull failed: ' + msg, 5000);
    console.error('[DayOS] Pull error:', err);
  }
};

function setSyncStatus(s) {
  syncStatus = s;
  const dot = document.querySelector('.sync-dot');
  if (dot) { dot.className = 'sync-dot ' + s; }
}

// ── Firebase Sync ─────────────────────────────────────────────
async function syncBlockDoc(b) {
  if (!user) return;
  try { await setDoc(doc(db, 'users', user.uid, 'blocks', b.id), b); } catch {}
}

async function syncCaptureDoc(c) {
  if (!user) return;
  try { await setDoc(doc(db, 'users', user.uid, 'captures', c.id), c); } catch {}
}

async function initialSync(uid) {
  setSyncStatus('syncing');
  const localBlocksBefore   = blocks.length;
  const localCapturesBefore = captures.length;
  try {
    const [bSnap, cSnap, rSnap] = await Promise.all([
      getDocs(collection(db, 'users', uid, 'blocks')),
      getDocs(collection(db, 'users', uid, 'captures')),
      getDocs(collection(db, 'users', uid, 'ratings')),
    ]);

    // Merge strategy: local fills gaps, remote wins on same ID.
    // This means all your local entries are ALWAYS kept — nothing is lost on sign-in.
    const remoteBlocks   = bSnap.docs.map(d => d.data());
    const remoteCaptures = cSnap.docs.map(d => d.data());
    const remoteRatings  = {};
    rSnap.docs.forEach(d => { remoteRatings[d.id] = d.data().rating; });

    const mergedBlocks   = mergeById(blocks, remoteBlocks);
    const mergedCaptures = mergeById(captures, remoteCaptures);
    const mergedRatings  = { ...ratings, ...remoteRatings };

    blocks   = mergedBlocks;
    captures = mergedCaptures;
    ratings  = mergedRatings;
    saveAll();

    // Upload everything (including local-only items) to Firestore
    await firestoreBatchWrite(uid, mergedBlocks, mergedCaptures, mergedRatings);

    setSyncStatus('ok');

    // Tell the user exactly what happened to their data
    const localUploaded = mergedBlocks.length - remoteBlocks.length + mergedCaptures.length - remoteCaptures.length;
    if (localBlocksBefore > 0 && remoteBlocks.length === 0) {
      toast(`✓ Signed in — ${localBlocksBefore} blocks & ${localCapturesBefore} entries backed up`, 3500);
    } else if (remoteBlocks.length > 0 || remoteCaptures.length > 0) {
      toast(`✓ Synced — ${mergedBlocks.length} blocks, ${mergedCaptures.length} entries`, 3000);
    } else {
      toast(`✓ Signed in`);
    }

    render();
  } catch (err) {
    setSyncStatus('error');
    const isPerms = err.code === 'permission-denied' || err.message?.includes('permission');
    const msg = isPerms
      ? 'Firestore permission denied — open Account and fix your security rules'
      : 'Sync error — local data is safe. Open Account → Push local → cloud to retry.';
    toast(msg, 5000);
    console.error('[DayOS] initialSync error:', err.code, err.message);
  }
}

function mergeById(local, remote) {
  const map = {};
  local.forEach(x => { map[x.id] = x; });
  remote.forEach(x => { map[x.id] = x; }); // remote wins
  return Object.values(map);
}

// ── Auth state ────────────────────────────────────────────────
// Must call getRedirectResult() on every page load to collect the Google
// sign-in result after a redirect. Errors here are real and must be shown.
getRedirectResult(auth)
  .then(result => {
    // Success: onAuthStateChanged will fire and handle the user.
    // Clear the pending flag so the "completing sign-in" UI goes away.
    if (result?.user) sessionStorage.removeItem('dayos_redirect_pending');
  })
  .catch(err => {
    sessionStorage.removeItem('dayos_redirect_pending');
    if (err.code && err.code !== 'auth/no-current-user') {
      setSyncStatus('error');
      const msg = authErrMsg(err.code);
      toast('Sign-in failed: ' + msg, 4000);
      console.error('[DayOS] Redirect sign-in error:', err.code, err.message);
    }
  });

onAuthStateChanged(auth, async u => {
  user = u;
  if (u) {
    sessionStorage.removeItem('dayos_redirect_pending');
    await initialSync(u.uid);
    closeSheets(); // auto-close auth sheet on success
  } else {
    setSyncStatus('idle');
  }
  render();
});

  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), dur);
}
