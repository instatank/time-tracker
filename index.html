<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DayOS">
<title>DayOS</title>
<link rel="manifest" href="manifest.json">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d0d;
  --surface: #181818;
  --surface2: #212121;
  --surface3: #2a2a2a;
  --border: #2d2d2d;
  --border2: #3a3a3a;
  --text: #f0f0f0;
  --text2: #999;
  --text3: #555;
  --accent: #3b82f6;
  --danger: #ef4444;
  --success: #10b981;
  --warn: #f59e0b;

  --c-deep_work: #3b82f6;
  --c-admin:     #8b5cf6;
  --c-learning:  #10b981;
  --c-practice:  #f59e0b;
  --c-routine:   #6366f1;
  --c-leisure:   #f97316;
  --c-leaks:     #ef4444;

  --nav-h: 64px;
  --hdr-h: 52px;
  --r: 10px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  max-width: 100vw;
}

#root {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
  overflow-x: hidden;
}

/* ── Header ─────────────────────────────────────────────────── */
#hdr {
  flex-shrink: 0;
  height: var(--hdr-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 1rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: relative;
  z-index: 10;
}
.logo {
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--text);
}
.hdr-right { display: flex; align-items: center; gap: 0.75rem; }
.sync-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text3);
  transition: background 0.3s;
}
.sync-dot.syncing { background: var(--warn); animation: pulse 1s infinite; }
.sync-dot.ok      { background: var(--success); }
.sync-dot.error   { background: var(--danger); }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
.auth-btn {
  font-size: 0.78rem;
  color: var(--text2);
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 0.25rem 0.6rem;
  cursor: pointer;
}
.auth-btn:hover { color: var(--text); }

/* ── Main scroll area ────────────────────────────────────────── */
#main {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--nav-h) + 1rem);
  width: 100%;
}

/* ── Bottom nav ──────────────────────────────────────────────── */
#nav {
  flex-shrink: 0;
  height: var(--nav-h);
  display: flex;
  align-items: stretch;
  border-top: 1px solid var(--border);
  background: var(--bg);
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  background: none;
  border: none;
  color: var(--text3);
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: color 0.15s;
}
.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 22px; height: 22px; }

/* ── Sections / cards ───────────────────────────────────────── */
.view { padding: 1rem; width: 100%; box-sizing: border-box; overflow-x: hidden; }
.section { margin-bottom: 1.25rem; max-width: 100%; overflow: hidden; }
.sec-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.6rem;
}
.sec-title { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em; color: var(--text2); text-transform: uppercase; }
.sec-meta  { font-size: 0.72rem; color: var(--text3); }

/* ── More divider ───────────────────────────────────────────── */
.more-btn {
  width: 100%; display: flex; align-items: center; gap: 0.6rem;
  background: none; border: none; cursor: pointer; padding: 0.55rem 0; margin-top: 0.1rem;
}
.more-btn-line { flex: 1; height: 1px; background: var(--border2); transition: background 0.15s; }
.more-btn-text {
  font-size: 0.75rem; font-weight: 600; letter-spacing: 0.03em;
  color: var(--accent); white-space: nowrap; transition: opacity 0.15s;
}
.more-btn:active .more-btn-text, .more-btn:hover .more-btn-text { opacity: 0.7; }
.more-btn:active .more-btn-line, .more-btn:hover .more-btn-line { background: var(--accent); opacity: 0.5; }

/* ── Today view ─────────────────────────────────────────────── */
.today-header { margin-bottom: 1rem; }
.today-date { font-size: 1.1rem; font-weight: 600; }
.today-greeting { font-size: 0.85rem; color: var(--text2); margin-top: 2px; }

.action-row {
  display: flex;
  gap: 0.6rem;
  margin-bottom: 1.25rem;
}
.btn-log, .btn-cap {
  flex: 1;
  padding: 0.7rem 1rem;
  border-radius: var(--r);
  border: none;
  font-size: 0.88rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  transition: opacity 0.15s;
}
.btn-log { background: var(--accent); color: #fff; }
.btn-cap { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }
.btn-log:active, .btn-cap:active { opacity: 0.8; }

/* ── Block item ─────────────────────────────────────────────── */
.block-item {
  display: flex;
  gap: 0.75rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 0.75rem;
  margin-bottom: 0.5rem;
  cursor: pointer;
  transition: border-color 0.15s;
  max-width: 100%;
  box-sizing: border-box;
}
.block-item:hover { border-color: var(--border2); }
.block-time {
  font-size: 0.72rem;
  color: var(--text3);
  min-width: 52px;
  padding-top: 2px;
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
}
.block-body { flex: 1; min-width: 0; }
.block-top {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  margin-bottom: 0.2rem;
  flex-wrap: wrap;
}
.cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.cat-label { font-size: 0.72rem; font-weight: 600; }
.block-dur { font-size: 0.7rem; color: var(--text3); margin-left: auto; }
.block-label { font-size: 0.88rem; font-weight: 500; color: var(--text); }
.block-note { font-size: 0.78rem; color: var(--text2); margin-top: 0.2rem; }
.energy-badge {
  display: inline-block;
  margin-top: 0.3rem;
  font-size: 0.65rem;
  padding: 1px 6px;
  border-radius: 4px;
  font-weight: 500;
  background: var(--surface3);
  color: var(--text2);
}
.energy-badge.energy-high { color: var(--success); }
.energy-badge.energy-low  { color: var(--danger); }

/* ── Capture item ───────────────────────────────────────────── */
.capture-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 0.75rem;
  margin-bottom: 0.5rem;
  cursor: pointer;
  transition: border-color 0.15s;
  max-width: 100%;
  box-sizing: border-box;
}
.capture-item:hover { border-color: var(--border2); }
.cap-meta {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  margin-bottom: 0.3rem;
  flex-wrap: wrap;
}
.cap-type { font-size: 0.72rem; font-weight: 600; color: var(--text2); }
.cap-time { font-size: 0.7rem; color: var(--text3); margin-left: auto; }
.cap-body { font-size: 0.88rem; color: var(--text); white-space: pre-wrap; overflow-wrap: break-word; word-break: break-word; }
.cap-body-preview {
  font-size: 0.88rem;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.project-tag { font-size: 0.7rem; color: var(--accent); }
.tag-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 0.35rem; }
.tag-pill {
  font-size: 0.62rem;
  padding: 1px 7px;
  border-radius: 10px;
  background: var(--surface3);
  color: var(--text3);
  font-weight: 500;
  line-height: 1.5;
}
.tag-pill.tag-win { background: rgba(234,179,8,0.15); color: #eab308; }
.tag-pill.tag-dft { background: rgba(59,130,246,0.15); color: #60a5fa; }
.tag-pill.tag-insight { background: rgba(168,85,247,0.15); color: #a855f7; }
.tag-pill.tag-1pct { background: rgba(16,185,129,0.15); color: #10b981; }

/* ── DFT panel ─────────────────────────────────────────────── */
.dft-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 0.75rem;
  margin-bottom: 0.5rem;
}
.dft-panel-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.5rem;
}
.dft-panel-title {
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text2);
}
.dft-panel-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.5rem 0.7rem;
  color: var(--text);
  font-size: 0.85rem;
  outline: none;
  box-sizing: border-box;
  transition: border-color 0.15s;
}
.dft-panel-input:focus { border-color: var(--accent); }
.dft-panel-input::placeholder { color: var(--text3); }
.dft-body {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.dft-display {
  flex: 1;
  font-size: 0.88rem;
  color: var(--text);
  font-weight: 500;
  padding: 0.3rem 0;
  cursor: pointer;
  min-width: 0;
}
.dft-actions {
  display: flex;
  gap: 0.4rem;
  flex-shrink: 0;
}
.dft-tick-btn, .dft-skip-btn {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 1.5px solid;
  background: none;
  font-size: 0.85rem;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s;
  line-height: 1;
}
.dft-tick-btn { border-color: #22c55e; color: #22c55e; }
.dft-tick-btn:hover { background: rgba(34,197,94,0.15); }
.dft-skip-btn { border-color: #ef4444; color: #ef4444; }
.dft-skip-btn:hover { background: rgba(239,68,68,0.15); }
.dft-status-done {
  font-size: 0.88rem;
  color: #22c55e;
  font-weight: 500;
  padding: 0.15rem 0;
}
.dft-status-skipped {
  font-size: 0.88rem;
  color: var(--text3);
  font-weight: 500;
  padding: 0.15rem 0;
  text-decoration: line-through;
}
.dft-skipped-label {
  font-size: 0.65rem;
  color: var(--text3);
  font-weight: 400;
  margin-left: 0.4rem;
  text-decoration: none;
  display: inline-block;
}
.dft-hint {
  font-size: 0.68rem;
  color: var(--text3);
  margin-top: 0.3rem;
}

/* ── Day score ──────────────────────────────────────────────── */
.score-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.5rem;
}
.score-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 0.6rem 0.4rem;
  text-align: center;
}
.score-val { display: block; font-size: 1rem; font-weight: 700; }
.score-val.warn { color: var(--warn); }
.score-val.good { color: var(--success); }
.score-label { display: block; font-size: 0.65rem; color: var(--text2); margin-top: 2px; }

/* ── Star rating ────────────────────────────────────────────── */
.star-row { display: flex; gap: 0.5rem; }
.star-btn {
  font-size: 1.6rem;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text3);
  transition: color 0.1s, transform 0.1s;
  padding: 0;
  line-height: 1;
}
.star-btn.filled { color: var(--warn); }
.star-btn:active { transform: scale(1.2); }

/* ── Journal view ───────────────────────────────────────────── */
.filter-row {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
  margin-bottom: 1rem;
}
.fpill {
  font-size: 0.75rem;
  padding: 0.3rem 0.7rem;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
}
.fpill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.project-subtabs { display: flex; gap: 0.4rem; flex-wrap: wrap; margin: -0.25rem 0 0.75rem; padding: 0.5rem 0 0.25rem; border-top: 1px solid var(--border2); }
.proj-pill { font-size: 0.72rem; padding: 0.25rem 0.6rem; border-radius: 20px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text2); cursor: pointer; }
.proj-pill.active { background: var(--surface3); border-color: var(--accent); color: var(--accent); font-weight: 600; }

.journal-search {
  position: relative;
  margin-bottom: 0.75rem;
}
.journal-search input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.55rem 2.2rem 0.55rem 2.2rem;
  color: var(--text);
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.15s;
}
.journal-search input::placeholder { color: var(--text3); }
.journal-search input:focus { border-color: var(--border2); }
.journal-search .search-icon {
  position: absolute;
  left: 0.7rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 0.85rem;
  pointer-events: none;
}
.journal-search .search-clear {
  position: absolute;
  right: 0.5rem;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--text3);
  font-size: 1rem;
  cursor: pointer;
  padding: 0.2rem;
  line-height: 1;
  display: none;
}
.journal-search .search-clear.visible { display: block; }
.journal-search .search-clear:hover { color: var(--text2); }

.prompt-card {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 0.85rem 1rem;
  margin-bottom: 1rem;
  cursor: pointer;
  transition: border-color 0.15s;
}
.prompt-card:hover { border-color: var(--accent); }
.prompt-icon { font-size: 1.3rem; flex-shrink: 0; }
.prompt-text { flex: 1; }
.prompt-text strong { display: block; font-size: 0.88rem; color: var(--text); }
.prompt-text span { font-size: 0.78rem; color: var(--text2); }
.prompt-arrow { color: var(--text3); font-size: 1rem; }

/* ── History view ───────────────────────────────────────────── */
.cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.75rem;
}
.cal-title { font-size: 0.9rem; font-weight: 600; }
.cal-nav-btn {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--text2);
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 0.9rem;
}
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
  margin-bottom: 1.25rem;
}
.cal-day-label {
  text-align: center;
  font-size: 0.65rem;
  color: var(--text3);
  padding: 0.2rem 0;
  font-weight: 600;
}
.cal-day {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.8rem;
  color: var(--text2);
  position: relative;
  border: 1px solid transparent;
  transition: all 0.1s;
}
.cal-day:hover { background: var(--surface2); }
.cal-day.today-cell { color: var(--text); font-weight: 700; }
.cal-day.selected { background: var(--accent); color: #fff; border-color: var(--accent); }
.cal-day.has-data .cal-dots { display: flex; gap: 1.5px; margin-top: 2px; }
.cal-dots { display: none; }
.cal-dot { width: 4px; height: 4px; border-radius: 50%; }
.cal-day.empty { cursor: default; }
.hist-day-hdr {
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 0.75rem;
  color: var(--text);
}

/* ── Dashboard view ─────────────────────────────────────────── */
.range-toggle {
  display: flex;
  background: var(--surface2);
  border-radius: 8px;
  padding: 3px;
  gap: 2px;
  margin-bottom: 1.25rem;
  align-self: flex-start;
  width: fit-content;
}
.range-btn {
  padding: 0.3rem 1rem;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.range-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.5); }

.bar-chart { margin-bottom: 1.25rem; }
.bar-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.55rem;
}
.bar-lbl { font-size: 0.75rem; color: var(--text2); min-width: 72px; max-width: 72px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-track {
  flex: 1;
  height: 8px;
  background: var(--surface2);
  border-radius: 4px;
  overflow: hidden;
}
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
.bar-val { font-size: 0.72rem; color: var(--text3); min-width: 32px; text-align: right; font-variant-numeric: tabular-nums; }

.metrics-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.6rem;
}
.metric-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 0.85rem;
}
.metric-val { font-size: 1.5rem; font-weight: 700; line-height: 1.2; }
.metric-val.warn { color: var(--warn); }
.metric-val.bad  { color: var(--danger); }
.metric-val.good { color: var(--success); }
.metric-lbl { font-size: 0.72rem; color: var(--text2); margin-top: 3px; }

/* ── Weekly Review ─────────────────────────────────────────── */
.wr-nav-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
}
.wr-back {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  font-size: 0.82rem;
  color: var(--text2);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
}
.wr-back:hover { color: var(--text); }
.wr-week-nav {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.wr-week-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  cursor: pointer;
  font-size: 1.1rem;
  line-height: 1;
  padding: 0.15rem 0.5rem;
}
.wr-week-btn:disabled { color: var(--text3); cursor: default; }
.wr-week-btn:not(:disabled):hover { background: var(--surface3); }
.wr-daterange {
  font-size: 0.95rem;
  font-weight: 700;
  margin-bottom: 0;
}
.wr-section-title {
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--text2);
  text-transform: uppercase;
  margin-bottom: 0.6rem;
  margin-top: 1.5rem;
}
.wr-section-title:first-of-type { margin-top: 0; }
.wr-stat {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.5rem 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.88rem;
}
.wr-stat-label { color: var(--text2); }
.wr-stat-val { font-weight: 600; }
.wr-best-day {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 0.75rem;
  margin: 0.6rem 0;
  font-size: 0.85rem;
}
.wr-best-day strong { color: var(--warn); }
.wr-observation {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 0.75rem;
  margin-bottom: 0.5rem;
  font-size: 0.85rem;
  color: var(--text);

<script type="module">
import { initializeApp }                    from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
import { getAuth, GoogleAuthProvider,
         signInWithPopup, signInWithRedirect,
         getRedirectResult, signOut,
         onAuthStateChanged }               from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
import { getFirestore, collection, doc,
         getDocs, getDoc, setDoc, deleteDoc,
         writeBatch }                       from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

// ── Firebase ──────────────────────────────────────────────────
const fbApp = initializeApp({
  apiKey:            "AIzaSyAxVCwVHFxRSHNXDhAoCGhj4Y1yfs6qUks",
  authDomain:        "time-tracker-f07da.firebaseapp.com",
  projectId:         "time-tracker-f07da",
  storageBucket:     "time-tracker-f07da.firebasestorage.app",
  messagingSenderId: "121620268176",
  appId:             "1:121620268176:web:35250f2252023378f3c415"
});
const auth = getAuth(fbApp);
const db   = getFirestore(fbApp);
let unsubs = [];

// ── Constants ─────────────────────────────────────────────────
const CATS = [
  { id: 'deep_work', label: 'Deep Work', icon: '🎯', color: '#16a34a' },
  { id: 'learning',  label: 'Learning',  icon: '📚', color: '#4ade80' },
  { id: 'practice',  label: 'Practice',  icon: '🧘', color: '#3b82f6' },
  { id: 'routine',   label: 'Routine',   icon: '🏠', color: '#eab308' },
  { id: 'leisure',   label: 'Leisure',   icon: '🎮', color: '#f97316' },
  { id: 'leaks',     label: 'Leaks',     icon: '🕳️', color: '#ef4444' },
];
const SLEEP_CAT = { id: 'sleep', label: 'Sleep', icon: '😴', color: '#6366f1' };
const CTYPES = [
  { id: 'note',    label: 'Quick Note', icon: '💭' },
  { id: 'journal', label: 'Journal',    icon: '📓' },
  { id: 'project', label: 'Project',    icon: '📁' },
];
// Legacy: Insight type removed from selector but old entries still render gracefully
const LEGACY_CTYPES = { insight: { id: 'insight', label: 'Insight', icon: '✨' } };
const TZ = 'Asia/Kolkata'; // must be declared before any state init that calls todayStr()
const SK = { BLOCKS: 'dayos_blocks_v1', CAPTURES: 'dayos_captures_v1', RATINGS: 'dayos_ratings_v1' };

// ── State ─────────────────────────────────────────────────────
let blocks   = loadLocal(SK.BLOCKS, []);
let captures = loadLocal(SK.CAPTURES, []);
let ratings  = loadLocal(SK.RATINGS, {});
let activeTab = 'today';
let histDate  = todayStr();
let histCalMonth = new Date(); histCalMonth.setDate(1);
let journalFilter = 'all';
let journalProjectFilter = null;
let journalExpanded = false;
let journalSearch = '';
let dashRange = 'week';
let showWeeklyReview = false;
let weeklyReviewOffset = 0; // 0 = current week, -1 = last week, etc.
let dashView = 'totals'; // 'totals' or 'overtime'
let weeklyReviews = loadLocal('dayos_weekly_reviews_v1', {});
let todayBksExpanded = false;
let todayCapsExpanded = false;
const TODAY_PREVIEW = 3;
let dfts = loadLocal('dayos_dfts_v1', {}); // { 'YYYY-MM-DD': 'focus task text' }
let user = null;
let syncStatus = 'idle';

// ── Modal state ───────────────────────────────────────────────
let editingBlockId = null;
let editingCaptureId = null;
let selCat = 'deep_work';
let selDur = 30;
let selEnergy = '';
let selCapType = 'note';

// ── Storage ───────────────────────────────────────────────────
function loadLocal(key, def) {
  try { return JSON.parse(localStorage.getItem(key)) ?? def; } catch { return def; }
}
function saveLocal(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
function saveAll() {
  saveLocal(SK.BLOCKS, blocks);
  saveLocal(SK.CAPTURES, captures);
  saveLocal(SK.RATINGS, ratings);
}

// ── Utils ─────────────────────────────────────────────────────
// ── IST timezone helpers ───────────────────────────────────────
function nowIST() { return new Date(new Date().toLocaleString('en-US', { timeZone: TZ })); }
function nowISTIso() {
  const d = nowIST();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' +
         String(d.getDate()).padStart(2,'0') + 'T' +
         String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0') + ':' +
         String(d.getSeconds()).padStart(2,'0');
}
function capDateIST(c) {
  if (c.timestamp.endsWith('Z') || c.timestamp.includes('+'))
    return new Date(c.timestamp).toLocaleDateString('en-CA', { timeZone: TZ });
  return c.timestamp.slice(0, 10);
}
function todayStr() {
  const d = nowIST();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function extractTags(text) {
  const matches = text.match(/#[a-zA-Z0-9_%]+/g);
  if (!matches) return [];
  return [...new Set(matches.map(t => t.toLowerCase()))];
}
function catById(id) { return CATS.find(c => c.id === id) || CATS[0]; }
function ctypeById(id) { return CTYPES.find(c => c.id === id) || LEGACY_CTYPES[id] || CTYPES[0]; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', hour12:true, timeZone: TZ });
}
function fmtDate(d) {
  return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric', timeZone: TZ });
}
function addDays(dateStr, n) {
  const [y, m, day] = dateStr.split('-').map(Number);
  return new Date(Date.UTC(y, m-1, day + n)).toISOString().slice(0,10);
}
function greeting() {
  const h = nowIST().getHours();
  if (h < 12) return 'Good morning';
  if (h < 17) return 'Good afternoon';
  return 'Good evening';
}
function fmtDayHeader() {
  return new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', timeZone: TZ });
}
function timeToISO(dateStr, timeStr) {
  return `${dateStr}T${timeStr}:00`;
}

// ── Compute ───────────────────────────────────────────────────
function dayScore(date) {
  const bks = blocks.filter(b => b.date === date);
  const caps = captures.filter(c => capDateIST(c) === date);
  const totalMin = bks.filter(b => b.category !== 'sleep').reduce((s, b) => s + (b.duration_min || 0), 0);
  const deepWorkMin = bks.filter(b => b.category === 'deep_work').reduce((s, b) => s + (b.duration_min || 0), 0);
  const leakMin = bks.filter(b => b.category === 'leaks').reduce((s, b) => s + (b.duration_min || 0), 0);
  const practiceDone = bks.some(b => b.category === 'practice');
  const journalDone = caps.some(c => c.type === 'journal');
  return {
    totalHrs: totalMin / 60,
    deepWorkHrs: deepWorkMin / 60,
    leakHrs: leakMin / 60,
    practiceDone,
    journalDone,
  };
}
function catBreakdown(bks) {
  const map = {};
  CATS.forEach(c => map[c.id] = 0);
  map[SLEEP_CAT.id] = 0;
  bks.forEach(b => { map[b.category] = (map[b.category] || 0) + (b.duration_min || 0) / 60; });
  return map;
}
function journalStreak() {
  let streak = 0;
  let d = todayStr();
  while (true) {
    const hasCap = captures.some(c => capDateIST(c) === d && c.type === 'journal');
    if (!hasCap) break;
    streak++;
    d = addDays(d, -1);
  }
  return streak;
}
function avgRating(startDate, endDate) {
  const vals = [];
  let d = startDate;
  while (d <= endDate) {
    if (ratings[d]) vals.push(ratings[d]);
    d = addDays(d, 1);
  }
  return vals.length ? vals.reduce((a,b) => a+b, 0) / vals.length : 0;
}

// ── Render ────────────────────────────────────────────────────
function render() {
  renderHdr();
  renderNav();
  renderMain();
}

function renderHdr() {
  document.getElementById('hdr').innerHTML = `
    <span class="logo">DayOS</span>
    <div class="hdr-right">

      <button class="auth-btn" onclick="openAuth()">${user ? (user.displayName?.split(' ')[0] || 'Me') : 'Sign in'}</button>
    </div>
  `;
}

function renderNav() {
  const tabs = [
    { id: 'today',     icon: navIconToday(),     label: 'Today' },
    { id: 'journal',   icon: navIconJournal(),   label: 'Journal' },
    { id: 'history',   icon: navIconHistory(),   label: 'History' },
    { id: 'dashboard', icon: navIconDashboard(), label: 'Trends' },
  ];
  document.getElementById('nav').innerHTML = tabs.map(t => `
    <button class="nav-btn ${activeTab === t.id ? 'active' : ''}" onclick="setTab('${t.id}')">
      ${t.icon}
      <span>${t.label}</span>
    </button>
  `).join('');
}

function renderMain(keepScroll) {
  if (_chartInstance) { _chartInstance.destroy(); _chartInstance = null; }
  const el = document.getElementById('main');
  if (!keepScroll) el.scrollTop = 0;
  switch (activeTab) {
    case 'today':     el.innerHTML = renderToday(); break;
    case 'journal':   el.innerHTML = renderJournal(); break;
    case 'history':   el.innerHTML = renderHistory(); break;
    case 'dashboard': el.innerHTML = showWeeklyReview ? renderWeeklyReview() : renderDashboard(); break;
  }
}

// ── Journal ───────────────────────────────────────────────────
function renderJournal() {
  const h = new Date().getHours();
  const showMorning = h < 12;
  const showEvening = h >= 18;
  const typeLabel = { note: 'Quick Note', journal: 'Journal', project: 'Project', insight: 'Insight' };
  const tagFilters = { '#win': '#win', '#insight': '#insight', '#dft': '#dft' };
  const isTagFilter = journalFilter.startsWith('#');

  let filtered;
  if (journalFilter === 'all') {
    filtered = [...captures];
  } else if (isTagFilter) {
    filtered = captures.filter(c => (c.tags || []).includes(journalFilter));
  } else {
    filtered = captures.filter(c => c.type === journalFilter);
  }

  // Project sub-tab logic
  const projectCaptures = captures.filter(c => c.type === 'project');
  const projectNames = [...new Set(projectCaptures.map(c => c.project_tag).filter(Boolean))].sort();
  if (journalFilter === 'project' && journalProjectFilter) {
    filtered = filtered.filter(c => c.project_tag === journalProjectFilter);
  }

  if (journalSearch.trim()) {
    const q = journalSearch.trim().toLowerCase();
    filtered = filtered.filter(c => {
      const body = (c.body || '').toLowerCase();
      const tag = (c.project_tag || '').toLowerCase();
      const type = (typeLabel[c.type] || c.type || '').toLowerCase();
      return body.includes(q) || tag.includes(q) || type.includes(q);
    });
  }

  filtered.sort((a,b) => b.timestamp.localeCompare(a.timestamp));

  const hasSearch = journalSearch.length > 0;
  const noResults = filtered.length === 0 && (hasSearch || journalFilter !== 'all');

  const projectSubTabs = journalFilter === 'project' && projectNames.length ? `
    <div class="project-subtabs">
      <button class="proj-pill ${!journalProjectFilter ? 'active' : ''}" onclick="setJProjectFilter(null)">All Projects</button>
      ${projectNames.map(p => `
        <button class="proj-pill ${journalProjectFilter===p ? 'active' : ''}" onclick="setJProjectFilter('${esc(p)}')">${esc(p)}</button>
      `).join('')}
    </div>` : '';

  return `<div class="view">
    <div class="journal-search">
      <span class="search-icon">&#128269;</span>
      <input type="text" placeholder="Search entries..." value="${esc(journalSearch)}" oninput="setJSearch(this.value)" />
      <button class="search-clear ${hasSearch ? 'visible' : ''}" onclick="setJSearch('')">&times;</button>
    </div>

    <div class="filter-row">
      ${['all','journal','note','project'].map(f => `
        <button class="fpill ${journalFilter===f?'active':''}" onclick="setJFilter('${f}')">
          ${f === 'all' ? 'All' : (typeLabel[f] || f)}
        </button>`).join('')}
    </div>
    <div class="filter-row" style="margin-top:-0.5rem">
      ${['#win','#insight','#dft','#1%'].map(f => `
        <button class="fpill ${journalFilter===f?'active':''}" onclick="setJFilter('${f}')">
          ${f}
        </button>`).join('')}
    </div>

    ${projectSubTabs}

    ${(showMorning || showEvening) && journalFilter === 'all' && !hasSearch ? `
      <div class="prompt-card" onclick="openCapture('journal')">
        <div class="prompt-icon">${showMorning ? '🌅' : '🌙'}</div>
        <div class="prompt-text">
          <strong>${showMorning ? 'Morning check-in' : 'Evening reflection'}</strong>
          <span>${showMorning ? 'What matters today?' : 'How did the day go?'}</span>
        </div>
        <span class="prompt-arrow">→</span>
      </div>` : ''}

    ${noResults ? `<div class="empty">No results found.</div>` :
      filtered.length
        ? (journalExpanded ? filtered : filtered.slice(0, TODAY_PREVIEW)).map(renderCapFull).join('')
          + (filtered.length > TODAY_PREVIEW ? moreBtn(journalExpanded, filtered.length - TODAY_PREVIEW, 'toggleJournal') : '')
        : `<div class="empty">${journalFilter === 'all' ? 'No captures yet.' : 'No ' + (typeLabel[journalFilter] || journalFilter) + ' entries yet.'}</div>`}
  </div>`;
}

function renderTagPills(tags) {
  if (!tags || !tags.length) return '';
  const special = { '#win': 'tag-win', '#dft': 'tag-dft', '#insight': 'tag-insight', '#1%': 'tag-1pct' };
  return `<div class="tag-pills">${tags.map(t =>
    `<span class="tag-pill ${special[t] || ''}">${esc(t)}</span>`
  ).join('')}</div>`;
}

function renderCapFull(c) {
  const ct = ctypeById(c.type);
  const date = capDateIST(c);
  const isToday = date === todayStr();
  const dateLabel = isToday ? `Today · ${fmtTime(c.timestamp)}` : `${fmtDate(date)} · ${fmtTime(c.timestamp)}`;
  return `
    <div class="capture-item" onclick="openCapOpts('${c.id}')">
      <div class="cap-meta">
        <span>${ct.icon}</span>
        <span class="cap-type">${ct.label}</span>
        ${c.project_tag ? `<span class="project-tag">#${esc(c.project_tag)}</span>` : ''}
        <span class="cap-time">${dateLabel}</span>
      </div>
      <div class="cap-body" style="margin-top:0.25rem">${esc(c.body)}</div>
      ${renderTagPills(c.tags)}

}

// ── History ───────────────────────────────────────────────────
function renderHistory() {
  return `<div class="view">
    ${renderCalendar()}
    <div class="hist-day-hdr">
      ${fmtDate(histDate)}${ratings[histDate] ? ' &nbsp;·&nbsp; ' + '★'.repeat(ratings[histDate]) : ''}
    </div>
    ${renderDayBlocks(histDate)}
  </div>`;
}

function renderCalendar() {
  const y = histCalMonth.getFullYear();
  const m = histCalMonth.getMonth();
  const firstDay = new Date(y, m, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const td = todayStr();
  const monthLabel = histCalMonth.toLocaleDateString('en-US', { month:'long', year:'numeric' });

  // Collect dates with data (any blocks or captures)
  const datesWithBlocks = new Set(blocks.map(b => b.date));
  const datesWithCaps   = new Set(captures.map(c => capDateIST(c)));

  const dayNames = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  let cells = '';
  // Day name headers
  cells += dayNames.map(d => `<div class="cal-day-label">${d}</div>`).join('');
  // Empty cells before first day
  for (let i = 0; i < firstDay; i++) cells += `<div class="cal-day empty"></div>`;
  // Day cells
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === td;
    const isSelected = dateStr === histDate;
    const hasBk = datesWithBlocks.has(dateStr);
    const hasCp = datesWithCaps.has(dateStr);
    const hasData = hasBk || hasCp;
    const dotsBk = hasBk ? `<span class="cal-dot" style="background:var(--accent)"></span>` : '';
    const dotsCp = hasCp ? `<span class="cal-dot" style="background:var(--success)"></span>` : '';
    cells += `
      <div class="cal-day ${isToday?'today-cell':''} ${isSelected?'selected':''} ${hasData?'has-data':''}"
           onclick="setHistDate('${dateStr}')">
        ${d}
        <div class="cal-dots">${dotsBk}${dotsCp}</div>
      </div>`;
  }

  return `
    <div class="section">
      <div class="cal-header">
        <button class="cal-nav-btn" onclick="calPrevMonth()">‹</button>
        <span class="cal-title">${monthLabel}</span>
        <button class="cal-nav-btn" onclick="calNextMonth()">›</button>
      </div>
      <div class="cal-grid">${cells}</div>
    </div>`;
}

function renderDayBlocks(date) {
  const bks = blocks.filter(b => b.date === date).sort((a,b) => b.start_time.localeCompare(a.start_time));
  const caps = captures.filter(c => capDateIST(c) === date);
  if (!bks.length && !caps.length) return '<div class="empty">No data for this day.</div>';
  return [
    ...bks.map(renderBlock),
    ...(caps.length ? [`<div class="sec-hdr" style="margin-top:0.75rem"><span class="sec-title">Captures</span></div>`, ...caps.map(renderCapPreview)] : [])
  ].join('');
}

// ── Dashboard ─────────────────────────────────────────────────
let _chartInstance = null;

function renderDashboard() {
  const td = todayStr();
  const n = dashRange === 'week' ? 7 : 30;
  const startDate = addDays(td, -(n-1));
  const rangeBlocks = blocks.filter(b => b.date >= startDate && b.date <= td);
  const breakdown = catBreakdown(rangeBlocks);
  const sleepHrs = breakdown[SLEEP_CAT.id] || 0;
  const wakingHrs = Object.entries(breakdown).filter(([k]) => k !== SLEEP_CAT.id).reduce((a,[,v]) => a+v, 0);
  const maxHrs = Math.max(...Object.values(breakdown), 0.1);
  const totalHrs = wakingHrs; // exclude sleep from totals used for percentages
  const deepWorkHrs = breakdown['deep_work'] || 0;
  const leakHrs = breakdown['leaks'] || 0;
  const leakPct = totalHrs > 0 ? (leakHrs / totalHrs) * 100 : 0;
  const jStreak = journalStreak();
  const avgR = avgRating(startDate, td);

  const bars = [
    ...CATS.map(c => {
      const hrs = breakdown[c.id] || 0;
      const pct = maxHrs > 0 ? (hrs / maxHrs) * 100 : 0;
      return `
        <div class="bar-row">
          <span class="bar-lbl">${c.icon} ${c.label}</span>
          <div class="bar-track">
            <div class="bar-fill" style="width:${pct}%;background:${c.color}"></div>
          </div>
          <span class="bar-val">${hrs > 0 ? hrs.toFixed(1) + 'h' : '—'}</span>
        </div>`;
    }),
    (() => {
      const pct = maxHrs > 0 ? (sleepHrs / maxHrs) * 100 : 0;
      return `
        <div class="bar-row">
          <span class="bar-lbl">${SLEEP_CAT.icon} ${SLEEP_CAT.label}</span>
          <div class="bar-track">
            <div class="bar-fill" style="width:${pct}%;background:${SLEEP_CAT.color}"></div>
          </div>
          <span class="bar-val">${sleepHrs > 0 ? sleepHrs.toFixed(1) + 'h' : '—'}</span>
        </div>`;
    })(),
  ].join('');

  const leakClass = leakPct > 15 ? 'bad' : leakPct > 8 ? 'warn' : 'good';

  // Deep Work trend callout
  let trendCallout = '';
  if (dashView === 'overtime') {
    const prevStart = addDays(startDate, -n);
    const prevEnd = addDays(startDate, -1);
    const prevBlocks = blocks.filter(b => b.date >= prevStart && b.date <= prevEnd);
    const prevDW = prevBlocks.filter(b => b.category === 'deep_work').reduce((s, b) => s + (b.duration_min || 0), 0) / 60;
    const diff = deepWorkHrs - prevDW;
    if (Math.abs(diff) >= 0.1) {
      const arrow = diff > 0 ? '↑' : '↓';
      const cls = diff > 0 ? 'trend-up' : 'trend-down';
      trendCallout = `<div class="trend-callout ${cls}">${arrow} Deep Work ${diff > 0 ? 'up' : 'down'} ${Math.abs(diff).toFixed(1)}h vs previous period</div>`;
    }
  }

  const chartSection = dashView === 'overtime' ?
    `<div class="section">
      <div class="sec-hdr"><span class="sec-title">Over Time</span></div>
      <div class="trend-chart-wrap"><canvas id="trend-chart"></canvas></div>
      ${trendCallout}
    </div>` :
    `<div class="section">
      <div class="sec-hdr"><span class="sec-title">Time by Category</span><span class="sec-meta">${totalHrs.toFixed(1)}h waking</span></div>
      <div class="bar-chart">${bars}</div>
    </div>`;

  const html = `<div class="view">
    <button class="wr-open-btn" onclick="openWeeklyReview()">📋 Weekly Review</button>

    <div class="range-toggle">
      <button class="range-btn ${dashRange==='week'?'active':''}" onclick="setDashRange('week')">Week</button>
      <button class="range-btn ${dashRange==='month'?'active':''}" onclick="setDashRange('month')">Month</button>
    </div>

    <div class="view-toggle">
      <button class="view-btn ${dashView==='totals'?'active':''}" onclick="setDashView('totals')">Totals</button>
      <button class="view-btn ${dashView==='overtime'?'active':''}" onclick="setDashView('overtime')">Over Time</button>
    </div>

    ${chartSection}

    <div class="section">
      <div class="sec-hdr"><span class="sec-title">Metrics</span></div>
      <div class="metrics-grid">
        <div class="metric-card">
          <div class="metric-val">${deepWorkHrs.toFixed(1)}h</div>
          <div class="metric-lbl">Deep Work</div>
        </div>
        <div class="metric-card">
          <div class="metric-val ${leakClass}">${leakPct.toFixed(0)}%</div>
          <div class="metric-lbl">Leak Rate</div>
        </div>
        <div class="metric-card">
          <div class="metric-val">${jStreak}</div>
          <div class="metric-lbl">Journal Streak</div>
        </div>
        <div class="metric-card">
          <div class="metric-val">${avgR ? avgR.toFixed(1) : '—'}</div>
          <div class="metric-lbl">Avg Day Rating</div>
        </div>
      </div>
    </div>
  </div>`;

  // After rendering, build chart if overtime
  if (dashView === 'overtime') {
    setTimeout(() => buildTrendChart(td, n), 0);
  }

  return html;
}

let _chartJsPromise = null;
function loadChartJs() {
  if (window.Chart) return Promise.resolve();
  if (_chartJsPromise) return _chartJsPromise;
  _chartJsPromise = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js';
    s.onload = resolve;
    s.onerror = () => { _chartJsPromise = null; reject(); };
    document.head.appendChild(s);
  });
  return _chartJsPromise;
}

async function buildTrendChart(td, n) {
  try {
    await loadChartJs();
  } catch { return; }

  const canvas = document.getElementById('trend-chart');
  if (!canvas) return;

  if (_chartInstance) { _chartInstance.destroy(); _chartInstance = null; }

  let labels, datasets;

  const allChartCats = [...CATS, SLEEP_CAT];
  if (dashRange === 'week') {
    // 7 days, by day
    labels = [];
    const dayData = {};
    allChartCats.forEach(c => { dayData[c.id] = []; });
    for (let i = 6; i >= 0; i--) {
      const d = addDays(td, -i);
      const dt = new Date(d + 'T00:00:00');
      labels.push(dt.toLocaleDateString('en-US', { weekday: 'short' }));
      const dayBlocks = blocks.filter(b => b.date === d);
      allChartCats.forEach(c => {
        const hrs = dayBlocks.filter(b => b.category === c.id).reduce((s, b) => s + (b.duration_min || 0), 0) / 60;
        dayData[c.id].push(hrs);
      });
    }
    datasets = allChartCats.map(c => ({
      label: c.label,
      data: dayData[c.id],
      borderColor: c.color,
      backgroundColor: c.color + '33',
      tension: 0.3,
      pointRadius: 3,
      borderWidth: 2,
    }));
  } else {
    // 4 weeks
    labels = [];
    const weekData = {};
    allChartCats.forEach(c => { weekData[c.id] = []; });
    for (let w = 3; w >= 0; w--) {
      const wEnd = addDays(td, -w * 7);
      const wStart = addDays(wEnd, -6);
      const sd = new Date(wStart + 'T00:00:00');
      labels.push(sd.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));
      const wBlocks = blocks.filter(b => b.date >= wStart && b.date <= wEnd);
      allChartCats.forEach(c => {
        const hrs = wBlocks.filter(b => b.category === c.id).reduce((s, b) => s + (b.duration_min || 0), 0) / 60;
        weekData[c.id].push(hrs);
      });
    }
    datasets = allChartCats.map(c => ({
      label: c.label,
      data: weekData[c.id],
      borderColor: c.color,
      backgroundColor: c.color + '33',
      tension: 0.3,
      pointRadius: 3,
      borderWidth: 2,
    }));
  }

  _chartInstance = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          labels: { color: '#999', font: { size: 11 }, boxWidth: 12, padding: 10 }
        }
      },
      scales: {
        x: {
          ticks: { color: '#666', font: { size: 11 } },
          grid: { color: '#2d2d2d' }
        },
        y: {
          beginAtZero: true,
          ticks: { color: '#666', font: { size: 11 }, callback: v => v + 'h' },
          grid: { color: '#2d2d2d' }
        }
      }
    }
  });
}

// ── Weekly Review ─────────────────────────────────────────────
function getWeekStart(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay(); // 0=Sun
  const diff = day === 0 ? 6 : day - 1; // Mon = start
  d.setDate(d.getDate() - diff);
  return d.toISOString().slice(0, 10);
}

function renderWeeklyReview() {
  const td = todayStr();
  const currentWeekStart = getWeekStart(td);
  const weekStart = addDays(currentWeekStart, weeklyReviewOffset * 7);
  const weekEnd = addDays(weekStart, 6);
  const prevWeekStart = addDays(weekStart, -7);

  const fmtRange = (s, e) => {
    const sd = new Date(s + 'T00:00:00');
    const ed = new Date(e + 'T00:00:00');
    return sd.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' – ' +
           ed.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  };

  // Gather week data
  const rangeBlocks = blocks.filter(b => b.date >= weekStart && b.date <= weekEnd);
  const breakdown = catBreakdown(rangeBlocks);
  const sleepHrsWR = breakdown[SLEEP_CAT.id] || 0;
  const totalHrs = Object.entries(breakdown).filter(([k]) => k !== SLEEP_CAT.id).reduce((a,[,v]) => a+v, 0);
  const deepWorkHrs = breakdown['deep_work'] || 0;
  const leakHrs = breakdown['leaks'] || 0;
  const leakPct = totalHrs > 0 ? (leakHrs / totalHrs * 100) : 0;
  const maxHrs = Math.max(...Object.values(breakdown), 0.1);

  // Journal streak for the week
  let jDays = 0;
  for (let i = 0; i < 7; i++) {
    const d = addDays(weekStart, i);
    if (captures.some(c => c.timestamp.startsWith(d) && c.type === 'journal')) jDays++;
  }

  // Best day
  let bestDay = null;
  let bestScore = -1;
  const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
  let daysLogged = 0;
  for (let i = 0; i < 7; i++) {
    const d = addDays(weekStart, i);
    const dayBlocks = blocks.filter(b => b.date === d);
    if (dayBlocks.length === 0 && !ratings[d]) continue;
    daysLogged++;
    const dw = dayBlocks.filter(b => b.category === 'deep_work').reduce((s, b) => s + (b.duration_min || 0), 0) / 60;
    const r = ratings[d] || 0;
    const score = dw * 2 + r;
    if (score > bestScore) {
      bestScore = score;
      const dn = dayNames[new Date(d + 'T00:00:00').getDay()];
      const parts = [];
      if (dw > 0) parts.push(dw.toFixed(1) + 'h deep work');
      if (r > 0) parts.push('rated ' + r + '★');
      bestDay = { name: dn, detail: parts.join(', ') };
    }
  }

  // Bars for breakdown
  const bars = [
    ...CATS.map(c => {
      const hrs = breakdown[c.id] || 0;
      const pct = maxHrs > 0 ? (hrs / maxHrs) * 100 : 0;
      return `
        <div class="bar-row">
          <span class="bar-lbl">${c.icon} ${c.label}</span>
          <div class="bar-track">
            <div class="bar-fill" style="width:${pct}%;background:${c.color}"></div>
          </div>
          <span class="bar-val">${hrs > 0 ? hrs.toFixed(1) + 'h' : '—'}</span>
        </div>`;
    }),
    (() => {
      const pct = maxHrs > 0 ? (sleepHrsWR / maxHrs) * 100 : 0;
      return `
        <div class="bar-row">
          <span class="bar-lbl">${SLEEP_CAT.icon} ${SLEEP_CAT.label}</span>
          <div class="bar-track">
            <div class="bar-fill" style="width:${pct}%;background:${SLEEP_CAT.color}"></div>
          </div>
          <span class="bar-val">${sleepHrsWR > 0 ? sleepHrsWR.toFixed(1) + 'h' : '—'}</span>
        </div>`;
    })(),
  ].join('');

  // Patterns (auto-generated observations)
  const observations = [];
  if (daysLogged >= 3) {
    // Check practice correlation with deep work
    const daysWithPractice = [];
    const daysWithoutPractice = [];
    for (let i = 0; i < 7; i++) {
      const d = addDays(weekStart, i);
      const dayBlocks = blocks.filter(b => b.date === d);
      if (dayBlocks.length === 0) continue;
      const hasPractice = dayBlocks.some(b => b.category === 'practice');
      const dw = dayBlocks.filter(b => b.category === 'deep_work').reduce((s, b) => s + (b.duration_min || 0), 0) / 60;
      if (hasPractice) daysWithPractice.push(dw);
      else daysWithoutPractice.push(dw);
    }
    if (daysWithPractice.length > 0 && daysWithoutPractice.length > 0) {
      const avgWith = daysWithPractice.reduce((a, b) => a + b, 0) / daysWithPractice.length;
      const avgWithout = daysWithoutPractice.reduce((a, b) => a + b, 0) / daysWithoutPractice.length;
      if (Math.abs(avgWith - avgWithout) > 0.3) {
        observations.push(`Your deep work averaged ${avgWith.toFixed(1)}h on days with Practice vs ${avgWithout.toFixed(1)}h without.`);
      }
    }

    // Check which day had most leaks
    let maxLeakDay = null;
    let maxLeakHrs = 0;
    let totalLeakHrs = 0;
    for (let i = 0; i < 7; i++) {
      const d = addDays(weekStart, i);
      const lk = blocks.filter(b => b.date === d && b.category === 'leaks').reduce((s, b) => s + (b.duration_min || 0), 0) / 60;
      totalLeakHrs += lk;
      if (lk > maxLeakHrs) { maxLeakHrs = lk; maxLeakDay = dayNames[new Date(d + 'T00:00:00').getDay()]; }
    }
    if (maxLeakHrs > 0 && totalLeakHrs > 0 && maxLeakHrs / totalLeakHrs > 0.4) {
      observations.push(`Most of your leaks came from ${maxLeakDay}.`);
    }

    // Check disproportionate category
    if (totalHrs > 0) {
      CATS.forEach(c => {
        const pct = (breakdown[c.id] || 0) / totalHrs * 100;
        if (pct >= 40 && c.id !== 'deep_work') {
          observations.push(`${c.label} made up ${pct.toFixed(0)}% of your week.`);
        }
      });
    }
  }
  const obsSlice = observations.slice(0, 2);

  // Previous week intention
  const prevIntention = weeklyReviews[prevWeekStart]?.intention;
  const currentIntention = weeklyReviews[weekStart]?.intention || '';

  return `<div class="view">
    <div class="wr-nav-row">
      <button class="wr-back" onclick="closeWeeklyReview()">← Back</button>
      <div class="wr-week-nav">
        <button class="wr-week-btn" onclick="shiftWeeklyReview(-1)">‹</button>
        <span class="wr-daterange">${fmtRange(weekStart, weekEnd)}</span>
        <button class="wr-week-btn" onclick="shiftWeeklyReview(1)" ${weeklyReviewOffset >= 0 ? 'disabled' : ''}>›</button>
      </div>
    </div>

    <div class="wr-section-title">The Week at a Glance</div>
    <div class="wr-stat"><span class="wr-stat-label">Waking hours</span><span class="wr-stat-val">${totalHrs.toFixed(1)}h</span></div>
    <div class="bar-chart" style="margin-top:0.6rem">${bars}</div>

    ${bestDay ? `<div class="wr-best-day"><strong>Best day:</strong> ${bestDay.name}${bestDay.detail ? ' · ' + bestDay.detail : ''}</div>` : ''}

    <div class="wr-stat"><span class="wr-stat-label">Leak rate</span><span class="wr-stat-val">${leakPct.toFixed(0)}%</span></div>
    <div class="wr-stat"><span class="wr-stat-label">Journal streak</span><span class="wr-stat-val">${jDays} / 7 days</span></div>

    <div class="wr-section-title">Patterns</div>
    ${daysLogged < 3 ? '<div class="empty" style="padding:1rem 0">Not enough data yet.</div>' :
      obsSlice.length ? obsSlice.map(o => `<div class="wr-observation">${esc(o)}</div>`).join('') :
      '<div class="empty" style="padding:1rem 0">No standout patterns this week.</div>'}

    <div class="wr-section-title">Intention for Next Week</div>
    ${prevIntention ? `<div class="wr-prev-intention"><span>Last week you wrote:</span>${esc(prevIntention)}</div>` : ''}
    <textarea class="wr-intention-area" id="wr-intention" placeholder="One intention for next week...">${esc(currentIntention)}</textarea>
    <button class="wr-save-btn" onclick="saveWeeklyIntention()">Save</button>
  </div>`;
}

function openLogBlock(blockId = null) {
  editingBlockId = blockId;
  const b = blockId ? blocks.find(x => x.id === blockId) : null;

  // Populate defaults
  const now = nowIST();
  const defaultTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  document.getElementById('block-sheet-title').textContent = blockId ? 'Edit Block' : 'Log Block';
  document.getElementById('f-time').value = b ? b.start_time : defaultTime;
  document.getElementById('f-label').value = b ? b.label : '';
  document.getElementById('f-note').value  = b ? (b.note || '') : '';

  selCat    = b ? b.category   : 'deep_work';
  selDur    = b ? (b.duration_min || 30) : 30;
  selEnergy = b ? (b.energy_level || '') : '';

  renderCatGrid();
  renderDurPills();
  renderEnergyPills();

  // Pre-build sorted unique labels for autocomplete
  window._labelSuggestions = [...new Set(blocks.map(b => b.label).filter(Boolean))].sort();

  openSheet('sheet-block');
  setTimeout(() => document.getElementById('f-label').focus(), 300);
}

function renderCatGrid() {
  document.getElementById('cat-grid').innerHTML = CATS.map(c => `
    <button class="cat-pill ${selCat === c.id ? 'active' : ''}"
            style="${selCat === c.id ? `background:${c.color};border-color:${c.color};` : ''}"
            onclick="selCatFn('${c.id}')">
      <span class="cat-icon">${c.icon}</span>
      <span>${c.label}</span>
    </button>`).join('');
}

function renderDurPills() {
  document.querySelectorAll('.dur-pill').forEach(btn => {
    const v = parseInt(btn.dataset.dur);
    const isCustom = v === 0;
    const isActive = isCustom ? (![15,30,45,60,90].includes(selDur)) : (v === selDur);
    btn.classList.toggle('active', isActive);
    if (isActive) btn.style.background = 'var(--accent)';
    else btn.style.background = '';
  });
  const custom = document.getElementById('f-dur-custom');
  const showCustom = ![30,45,60,90].includes(selDur);
  custom.style.display = showCustom ? 'block' : 'none';
  if (showCustom) custom.value = selDur || '';
}

function renderEnergyPills() {
  document.querySelectorAll('[data-energy]').forEach(btn => {
    const isActive = btn.dataset.energy === selEnergy;
    btn.classList.toggle('active', isActive);
    btn.style.background = isActive ? 'var(--accent)' : '';
  });
}

  if (!matches.length) { dd.style.display = 'none'; return; }
  dd.innerHTML = matches.map(l => `<div style="padding:0.6rem 0.75rem;cursor:pointer;font-size:0.88rem;border-bottom:1px solid var(--border2)" ontouchstart="this.style.background='var(--surface3)'" onmousedown="pickLabel('${esc(l)}')">${esc(l)}</div>`).join('');

};

window.saveBlock = function() {
  const label = document.getElementById('f-label').value.trim();

  const timeVal = document.getElementById('f-time').value;
  const noteVal = document.getElementById('f-note').value.trim();
  const customDurVal = parseInt(document.getElementById('f-dur-custom').value) || 0;
  const duration = selDur === 0 ? customDurVal : selDur;
  const date = todayStr(); // always log to today from this modal (editing preserves original date)

  if (editingBlockId) {
    const idx = blocks.findIndex(b => b.id === editingBlockId);
    if (idx > -1) {
      blocks[idx] = { ...blocks[idx], start_time: timeVal, duration_min: duration, category: selCat, label, note: noteVal, energy_level: selEnergy };
      syncBlockDoc(blocks[idx]);
      toast('Block updated');
    }
  } else {
    const b = { id: uid(), date, start_time: timeVal, duration_min: duration, category: selCat, label, note: noteVal, energy_level: selEnergy };
    blocks.push(b);
    syncBlockDoc(b);
    toast('Block logged');
  }
  saveLocal(SK.BLOCKS, blocks);
  closeSheets();
  render();
};

// ── DFT ──────────────────────────────────────────────────────
function getDft(d) {
  const v = dfts[d];
  if (!v) return null;
  if (typeof v === 'string') return { text: v, status: 'pending' };
  return v;
}

function renderDftPanel(d) {
  const dft = getDft(d);
  const headerExtra = dft && dft.status === 'pending'
    ? `<button style="background:none;border:none;color:var(--text3);font-size:0.7rem;cursor:pointer;padding:2px 6px" onclick="clearDft()">clear</button>`
    : '';
  let body;
  if (!dft) {
    body = `<input class="dft-panel-input" placeholder="What's your #1 focus today?" onkeydown="if(event.key==='Enter'){saveDft(this.value)}" />`;
  } else if (dft.status === 'pending') {
    body = `
      <div class="dft-body">
        <div class="dft-display" onclick="editDft()">${esc(dft.text)}</div>
        <div class="dft-actions">
          <button class="dft-tick-btn" onclick="doneDft()" title="Mark done">✓</button>
          <button class="dft-skip-btn" onclick="skipDft()" title="Skip">✕</button>
        </div>
      </div>
      <div class="dft-hint">Tap task to edit · ✓ done logs to journal · ✕ skips</div>`;
  } else if (dft.status === 'done') {
    body = `<div class="dft-status-done">✓ ${esc(dft.text)}</div>`;
  } else {
    body = `<div class="dft-status-skipped">${esc(dft.text)}<span class="dft-skipped-label">skipped</span></div>`;
  }
  return `
    <div class="dft-panel">
      <div class="dft-panel-hdr">
        <span class="dft-panel-title">🎯 Daily Focus Task</span>
        ${headerExtra}
      </div>
      ${body}
    </div>`;
}

window.saveDft = function(val) {
  const text = val.trim();
  const d = todayStr();
  if (!text) { clearDft(); return; }
  const existing = getDft(d);
  dfts[d] = { text, status: existing && existing.status !== 'pending' ? existing.status : 'pending' };
  saveLocal('dayos_dfts_v1', dfts);
  renderMain();
};

window.editDft = function() {
  const d = todayStr();
  const dft = getDft(d);
  if (!dft || dft.status !== 'pending') return;
  const panel = document.querySelector('.dft-panel');
  if (!panel) return;
  const bodyEl = panel.querySelector('.dft-body');
  if (!bodyEl) return;
  bodyEl.outerHTML = `<input class="dft-panel-input" value="${esc(dft.text)}" onkeydown="if(event.key==='Enter'){saveDft(this.value)}" onblur="saveDft(this.value)" autofocus />`;
  panel.querySelector('.dft-panel-input').focus();
};

window.doneDft = function() {
  const d = todayStr();
  const dft = getDft(d);
  if (!dft) return;
  dfts[d] = { text: dft.text, status: 'done' };
  saveLocal('dayos_dfts_v1', dfts);
  // Auto-capture to journal with #dft tag
  const body = `✅ DFT done: ${dft.text} #dft`;
  const c = { id: uid(), timestamp: nowISTIso(), type: 'note', body, project_tag: '', tags: extractTags(body) };
  captures.push(c);
  saveLocal(SK.CAPTURES, captures);
  syncCaptureDoc(c);
  toast('DFT marked done ✓');
  render();
};

window.skipDft = function() {
  const d = todayStr();
  const dft = getDft(d);
  if (!dft) return;
  dfts[d] = { text: dft.text, status: 'skipped' };
  saveLocal('dayos_dfts_v1', dfts);
  toast('DFT skipped');
  renderMain();
};

window.clearDft = function() {
  delete dfts[todayStr()];
  saveLocal('dayos_dfts_v1', dfts);
  renderMain();
};

function sweepOldDfts() {
  const today = todayStr();
  let changed = false;
  Object.keys(dfts).forEach(d => {
    if (d < today) {
      const dft = getDft(d);
      if (dft && dft.status === 'pending') {
        dfts[d] = { text: dft.text, status: 'skipped' };
        changed = true;
      }
    }
  });
  if (changed) saveLocal('dayos_dfts_v1', dfts);
}

function authErrMsg(code) {
  const map = {
    'auth/popup-blocked':              'Popup was blocked — switching to redirect sign-in.',
    'auth/popup-closed-by-user':       'Sign-in window was closed.',
    'auth/cancelled-popup-request':    'Sign-in cancelled.',
    'auth/unauthorized-domain':        'This domain is not authorized. Add it in Firebase Console → Authentication → Authorized Domains.',
    'auth/network-request-failed':     'Network error — check your connection and try again.',
    'auth/too-many-requests':          'Too many attempts — please wait a moment and try again.',
    'auth/internal-error':             'Internal error — please try again.',
    'auth/user-disabled':              'This account has been disabled.',
  };
  return map[code] || `Sign-in failed: ${code}`;
}

function setAuthError(msg) {
  setSyncStatus('error');
  const el = document.getElementById('auth-error');
  if (el) { el.textContent = msg; el.style.display = 'block'; }
}

// ── Firestore batch write (handles >500 docs by splitting) ────
async function firestoreBatchWrite(uid, allBlocks, allCaptures, allRatings) {
  const ops = [
    ...allBlocks.map(b   => ({ ref: doc(db, 'users', uid, 'blocks',   b.id), data: b })),
    ...allCaptures.map(c => ({ ref: doc(db, 'users', uid, 'captures', c.id), data: c })),
    ...Object.entries(allRatings).map(([date, r]) => ({
      ref: doc(db, 'users', uid, 'ratings', date), data: { rating: r }
    })),
  ];
  const CHUNK = 400;
  for (let i = 0; i < ops.length; i += CHUNK) {
    const batch = writeBatch(db);
    ops.slice(i, i + CHUNK).forEach(op => batch.set(op.ref, op.data));
    await batch.commit();
  }
}

        </div>

  } else {
    body.innerHTML = `

      <button class="btn-google" id="btn-google-signin" onclick="doSignIn()">
        ${GOOGLE_SVG}
        Continue with Google
      </button>

window.doSignIn = async function() {
  const btn = document.getElementById('btn-google-signin');
  if (btn) { btn.disabled = true; btn.style.opacity = '0.6'; }

  try {
    // Popup is the right default for desktop — fast, no page navigation.
    // onAuthStateChanged fires after popup completes and handles everything.
    await signInWithPopup(auth, new GoogleAuthProvider());
  } catch (err) {
    if (btn) { btn.disabled = false; btn.style.opacity = ''; }

    if (err.code === 'auth/popup-blocked') {
      // Only fall back to redirect when popup is explicitly blocked (e.g. mobile)
      sessionStorage.setItem('dayos_redirect_pending', '1');
      try { await signInWithRedirect(auth, new GoogleAuthProvider()); }
      catch (e2) { sessionStorage.removeItem('dayos_redirect_pending'); setAuthError(authErrMsg(e2.code)); }
    } else if (err.code !== 'auth/popup-closed-by-user' && err.code !== 'auth/cancelled-popup-request') {
      // popup-closed-by-user = they dismissed it themselves, no error message needed
      setAuthError(authErrMsg(err.code));
    }
  }
};

window.cancelRedirect = function() {
  sessionStorage.removeItem('dayos_redirect_pending');
  openAuth(); // re-render sheet — now shows the sign-in button
};

window.doSignOut = async function() {
  await signOut(auth);
  unsubs.forEach(u => u());
  unsubs = [];
  closeSheets();
  toast('Signed out');
  render();
};

// Push everything from localStorage → Firestore (use on the device that HAS the data)
window.forcePushToCloud = async function() {
  if (!user) return;
  setSyncStatus('syncing');
  openAuth();
  console.log('[DayOS] Push → UID:', user.uid, '| blocks:', blocks.length, '| captures:', captures.length);
  try {
    await firestoreBatchWrite(user.uid, blocks, captures, ratings);

    // ── Verification: confirm at least one doc actually landed on the server ──
    if (blocks.length > 0) {
      const verifySnap = await getDoc(doc(db, 'users', user.uid, 'blocks', blocks[0].id));
      if (!verifySnap.exists()) {
        throw new Error('Write appeared to succeed but data not found in Firestore. ' +
          'This usually means Firestore security rules are blocking server writes. ' +
          'Go to Firebase Console → Firestore → Rules and set:\n\n' +
          'rules_version = \'2\';\nservice cloud.firestore {\n  match /databases/{database}/documents {\n' +
          '    match /users/{userId}/{document=**} {\n' +
          '      allow read, write: if request.auth.uid == userId;\n    }\n  }\n}');
      }
    }

    setSyncStatus('ok');
    console.log('[DayOS] Push verified ✓');
    toast(`✓ Uploaded & verified ${blocks.length} blocks & ${captures.length} captures`, 3500);
    openAuth();
  } catch (err) {
    setSyncStatus('error');
    const isRules = err.code === 'permission-denied' || err.message?.includes('not found in Firestore');
    const msg = isRules
      ? 'Rules error — go to Firebase Console → Firestore → Rules and allow read/write for authenticated users'
      : (err.message || 'Unknown error');
    const el = document.getElementById('sync-sheet-err');
    if (el) { el.textContent = msg; el.style.whiteSpace = 'pre-wrap'; }
    toast('Upload failed: ' + msg, 6000);
    console.error('[DayOS] Push error:', err.code, err.message);
  }
};

// Pull everything from Firestore → localStorage (use on the device that NEEDS the data)
window.forcePullFromCloud = async function() {
  if (!user) return;
  setSyncStatus('syncing');
  openAuth();
  console.log('[DayOS] Pull → UID:', user.uid);
  try {
    const [bSnap, cSnap, rSnap] = await Promise.all([
      getDocs(collection(db, 'users', user.uid, 'blocks')),
      getDocs(collection(db, 'users', user.uid, 'captures')),
      getDocs(collection(db, 'users', user.uid, 'ratings')),
    ]);
    const remoteBlocks   = bSnap.docs.map(d => d.data());
    const remoteCaptures = cSnap.docs.map(d => d.data());
    const remoteRatings  = {};
    rSnap.docs.forEach(d => { remoteRatings[d.id] = d.data().rating; });
    console.log('[DayOS] Pull raw from Firestore → blocks:', remoteBlocks.length, '| captures:', remoteCaptures.length);

    // Merge: keep all local + all remote (local fills gaps, remote wins same ID)
    blocks   = mergeById(blocks, remoteBlocks);
    captures = mergeById(captures, remoteCaptures);
    ratings  = { ...ratings, ...remoteRatings };
    saveAll();

    setSyncStatus('ok');
    toast(`✓ Pulled ${blocks.length} blocks & ${captures.length} captures from cloud`, 3500);
    openAuth();
    render();
  } catch (err) {
    setSyncStatus('error');
    const msg = (err.code === 'permission-denied')
      ? 'Permission denied — fix Firestore security rules'
      : (err.message || 'Unknown error');
    const el = document.getElementById('sync-sheet-err');
    if (el) el.textContent = msg;
    toast('Pull failed: ' + msg, 5000);
    console.error('[DayOS] Pull error:', err);
  }
};

function setSyncStatus(s) {
  syncStatus = s;
  const dot = document.querySelector('.sync-dot');
  if (dot) { dot.className = 'sync-dot ' + s; }
}

// ── Firebase Sync ─────────────────────────────────────────────
async function syncBlockDoc(b) {
  if (!user) return;
  try { await setDoc(doc(db, 'users', user.uid, 'blocks', b.id), b); } catch {}
}

async function syncCaptureDoc(c) {
  if (!user) return;
  try { await setDoc(doc(db, 'users', user.uid, 'captures', c.id), c); } catch {}
}

async function initialSync(uid) {
  setSyncStatus('syncing');
  const localBlocksBefore   = blocks.length;
  const localCapturesBefore = captures.length;
  try {
    const [bSnap, cSnap, rSnap] = await Promise.all([
      getDocs(collection(db, 'users', uid, 'blocks')),
      getDocs(collection(db, 'users', uid, 'captures')),
      getDocs(collection(db, 'users', uid, 'ratings')),
    ]);

    // Merge strategy: local fills gaps, remote wins on same ID.
    // This means all your local entries are ALWAYS kept — nothing is lost on sign-in.
    const remoteBlocks   = bSnap.docs.map(d => d.data());
    const remoteCaptures = cSnap.docs.map(d => d.data());
    const remoteRatings  = {};
    rSnap.docs.forEach(d => { remoteRatings[d.id] = d.data().rating; });

    const mergedBlocks   = mergeById(blocks, remoteBlocks);
    const mergedCaptures = mergeById(captures, remoteCaptures);
    const mergedRatings  = { ...ratings, ...remoteRatings };

    blocks   = mergedBlocks;
    captures = mergedCaptures;
    ratings  = mergedRatings;
    saveAll();

    // Upload everything (including local-only items) to Firestore
    await firestoreBatchWrite(uid, mergedBlocks, mergedCaptures, mergedRatings);

    setSyncStatus('ok');

    // Tell the user exactly what happened to their data
    const localUploaded = mergedBlocks.length - remoteBlocks.length + mergedCaptures.length - remoteCaptures.length;
    if (localBlocksBefore > 0 && remoteBlocks.length === 0) {
      toast(`✓ Signed in — ${localBlocksBefore} blocks & ${localCapturesBefore} entries backed up`, 3500);
    } else if (remoteBlocks.length > 0 || remoteCaptures.length > 0) {
      toast(`✓ Synced — ${mergedBlocks.length} blocks, ${mergedCaptures.length} entries`, 3000);
    } else {
      toast(`✓ Signed in`);
    }

    autoLogSleep();
    sweepOldDfts();
    render();
  } catch (err) {
    setSyncStatus('error');
    const isPerms = err.code === 'permission-denied' || err.message?.includes('permission');
    const msg = isPerms
      ? 'Firestore permission denied — open Account and fix your security rules'
      : 'Sync error — local data is safe. Open Account → Push local → cloud to retry.';
    toast(msg, 5000);
    console.error('[DayOS] initialSync error:', err.code, err.message);
  }
}

function mergeById(local, remote) {
  const map = {};
  local.forEach(x => { map[x.id] = x; });
  remote.forEach(x => { map[x.id] = x; }); // remote wins
  return Object.values(map);
}

// ── Auth state ────────────────────────────────────────────────
// Must call getRedirectResult() on every page load to collect the Google
// sign-in result after a redirect. Errors here are real and must be shown.
getRedirectResult(auth)
  .then(() => {
    // Always clear — whether redirect succeeded, returned null, or wasn't a redirect.
    // Leaving the flag set is what causes the "stuck on completing sign-in" bug.
    sessionStorage.removeItem('dayos_redirect_pending');
  })
  .catch(err => {
    sessionStorage.removeItem('dayos_redirect_pending');
    if (err.code && err.code !== 'auth/no-current-user') {
      setSyncStatus('error');
      toast('Sign-in failed: ' + authErrMsg(err.code), 4000);
      console.error('[DayOS] Redirect error:', err.code, err.message);
    }
  });

onAuthStateChanged(auth, u => {
  user = u;
  sessionStorage.removeItem('dayos_redirect_pending');
  if (u) {
    closeSheets();
    render(); // show app immediately — don't block on sync
    initialSync(u.uid); // sync in background
  } else {
    setSyncStatus('idle');
    render();
  }
});

// ── Auto-log Sleep ────────────────────────────────────────────
// Migrate old sleep blocks from 'routine' to 'sleep' category
function migrateSleepCategory() {
  let changed = false;
  blocks.forEach(b => {
    if (b.category === 'routine' && b.label === 'Sleep') {
      b.category = 'sleep';
      syncBlockDoc(b);
      changed = true;
    }
  });
  if (changed) saveLocal(SK.BLOCKS, blocks);
}

// Automatically logs 8h sleep (02:00–10:00) as a separate sleep category for each day.
// Runs on init and after any sync. Skips if a sleep block already exists for that date.
function autoLogSleep() {
  migrateSleepCategory();

  const td = todayStr();
  const h = new Date().getHours();

  // Backfill the last 7 days; add today if past 10am.
  const dates = [];
  for (let i = 7; i >= 1; i--) dates.push(addDays(td, -i));
  if (h >= 10) dates.push(td);

  let changed = false;
  for (const sleepDate of dates) {
    const alreadyLogged = blocks.some(b =>
      b.date === sleepDate && b.category === 'sleep' && b.label === 'Sleep'
    );
    if (alreadyLogged) continue;

    const b = {
      id: uid(),
      date: sleepDate,
      start_time: '02:00',
      duration_min: 480,
      category: 'sleep',
      label: 'Sleep',
      note: '',
      energy_level: '',
      _auto: true,
    };
    blocks.push(b);
    syncBlockDoc(b);
    changed = true;
  }
  if (changed) saveLocal(SK.BLOCKS, blocks);
}
